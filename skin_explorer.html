    <title>Skin Explorer</title>
    <style>
      body {
        background-color: #111;
        color: #fff;
        font-family: "Courier New", Courier, monospace;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      header {
        background-color: #222;
        border-bottom: 2px solid #333;
        padding: 15px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        z-index: 10;
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 2px 2px 0px #335699;
        color: #fff;
      }
      .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: #333;
        border: 1px solid #555;
        color: #fff;
        padding: 8px 15px;
        cursor: pointer;
        text-transform: uppercase;
        font-family: inherit;
        font-size: 0.8rem;
        border-radius: 4px;
        transition: all 0.2s;
        z-index: 20;
        text-decoration: none;
      }
      .back-btn:hover {
        background: #444;
        border-color: #335699;
      }
      #search-container {
        width: 100%;
        max-width: 600px;
        position: relative;
      }
      #search-input {
        width: 100%;
        padding: 12px 15px;
        font-size: 1rem;
        background-color: #333;
        border: 2px solid #555;
        color: #fff;
        border-radius: 4px;
        box-sizing: border-box;
        font-family: inherit;
        transition: border-color 0.2s;
      }
      #search-input:focus {
        outline: none;
        border-color: #335699;
      }
      .controls-container {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
        width: 100%;
        max-width: 600px;
        margin-top: 15px;
      }
      .filter-tags {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .filter-btn {
        background: #333;
        border: 1px solid #555;
        color: #ccc;
        padding: 6px 12px;
        font-size: 0.8rem;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      .filter-btn:hover {
        background: #444;
        color: #fff;
      }
      .filter-btn.active {
        background: #335699;
        border-color: #5588cc;
        color: #fff;
        font-weight: bold;
      }
      #sort-select {
        background: #333;
        border: 1px solid #555;
        color: #ccc;
        padding: 8px 12px;
        font-size: 0.8rem;
        border-radius: 4px;
        font-family: inherit;
        cursor: pointer;
      }
      #skins-grid {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 20px;
        align-content: start;
      }
      /* Scrollbar */
      #skins-grid::-webkit-scrollbar {
        width: 8px;
      }
      #skins-grid::-webkit-scrollbar-track {
        background: #111;
      }
      #skins-grid::-webkit-scrollbar-thumb {
        background: #333;
        border: 1px solid #555;
        border-radius: 4px;
      }
      .skin-card {
        background-color: #1a1a1a;
        border: 2px solid #333;
        border-radius: 8px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        transition:
          transform 0.2s,
          border-color 0.2s;
        cursor: pointer;
      }
      .skin-card:hover {
        transform: translateY(-5px);
        border-color: #335699;
        background-color: #222;
      }
      .skin-preview {
        width: 60px;
        height: 120px;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        filter: drop-shadow(0 4px 5px rgba(0, 0, 0, 0.5));
      }
      .skin-name {
        font-size: 0.9rem;
        font-weight: bold;
        text-align: center;
        color: #ddd;
      }
      .skin-copies {
        font-size: 0.7rem;
        color: #888;
        background-color: #111;
        padding: 3px 6px;
        border-radius: 4px;
        border: 1px solid #333;
      }
      .skin-copies.legendary {
        color: #ffd700;
        border-color: #b8860b;
      }
      .no-results {
        grid-column: 1 / -1;
        text-align: center;
        padding: 40px;
        color: #666;
        font-size: 1.2rem;
      }
      .skin-tags {
        display: flex;
        gap: 4px;
        margin-top: 4px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .skin-tag {
        font-size: 0.6rem;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: bold;
        text-transform: uppercase;
      }
      .skin-tag.honorary {
        background-color: #9b59b6;
        color: #fff;
        border: 1px solid #8e44ad;
      }
      .skin-tag.first-place {
        background-color: #f1c40f;
        color: #000;
        border: 1px solid #f39c12;
      }
      .skin-tag.competitive {
        background-color: #e67e22;
        color: #fff;
        border: 1px solid #d35400;
      }
      .skin-tag.unlock-code {
        background-color: #1abc9c;
        color: #fff;
        border: 1px solid #16a085;
      }
      .skin-tag.game-unlock {
        background-color: #2ecc71;
        color: #000;
        border: 1px solid #27ae60;
      }
      .skin-artist {
        font-size: 0.65rem;
        color: #666;
        margin-top: 2px;
      }
      .skin-for {
        font-size: 0.65rem;
        color: #335699;
        font-weight: bold;
        margin-top: 2px;
      }

      @media (max-width: 768px) {
        body {
          background: linear-gradient(to bottom, #111 0%, #0a0a12 100%);
        }

        header {
          position: sticky;
          top: 0;
          z-index: 50;
          background: rgba(20, 20, 20, 0.95);
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          padding: 10px 15px;
          gap: 10px;
          border-bottom: 1px solid rgba(255, 255, 255, 0.05);
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        h1 {
          font-size: 1.3rem;
          margin-bottom: 2px;
          width: 100%;
          text-align: center;
          pointer-events: none;
        }

        /* Back Button for Mobile */
        .back-btn {
          top: 12px;
          left: 12px;
          width: 32px;
          height: 32px;
          padding: 0;
          border-radius: 50%;
          font-size: 0; /* Hide text */
          display: flex;
          align-items: center;
          justify-content: center;
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .back-btn::before {
          content: "←";
          font-size: 1.2rem;
          color: #fff;
          margin-top: -2px;
        }

        #search-container {
          margin-top: 5px;
        }

        #search-input {
          background: rgba(0, 0, 0, 0.3);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 20px;
          padding: 10px 20px;
          font-size: 0.9rem;
        }
        #search-input:focus {
          border-color: #335699;
          background: rgba(0, 0, 0, 0.5);
        }

        .controls-container {
          flex-direction: column;
          gap: 10px;
          margin-top: 0;
        }

        .filter-tags {
          flex-wrap: nowrap;
          overflow-x: auto;
          justify-content: flex-start;
          width: 100%;
          padding-bottom: 5px;
          -webkit-overflow-scrolling: touch;
          gap: 8px;
          scrollbar-width: none; /* Firefox */
        }
        .filter-tags::-webkit-scrollbar {
          display: none;
        }

        .filter-btn {
          flex-shrink: 0;
          border-radius: 20px;
          padding: 8px 16px;
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1);
          font-size: 0.8rem;
          color: #ccc;
        }
        .filter-btn.active {
          background: #335699;
          border-color: #335699;
          color: #fff;
          box-shadow: 0 4px 15px rgba(51, 86, 153, 0.3);
        }

        #sort-select {
          width: 100%;
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 8px;
          color: #aaa;
          padding: 10px;
        }

        #skins-grid {
          padding: 15px;
          gap: 15px;
          grid-template-columns: repeat(2, 1fr);
        }

        .skin-card {
          background: rgba(255, 255, 255, 0.03);
          border: 1px solid rgba(255, 255, 255, 0.05);
          padding: 15px;
          border-radius: 12px;
          gap: 8px;
        }
        .skin-card:active {
          transform: scale(0.96);
          background: rgba(255, 255, 255, 0.08);
          border-color: #335699;
        }

        .skin-preview {
          width: 100%;
          height: 100px;
          filter: drop-shadow(0 5px 8px rgba(0, 0, 0, 0.6));
        }

        .skin-name {
          font-size: 0.9rem;
          margin-top: 5px;
        }

        .skin-copies {
          font-size: 0.65rem;
          padding: 2px 6px;
        }

        /* Mobile */
        .modal-content {
          width: 85%;
          max-height: 80vh;
          overflow-y: auto;
          padding: 30px 20px;
          border: 1px solid rgba(255, 255, 255, 0.1);
          box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
          background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
        }
        .modal-preview {
          height: 180px;
        }
      }

      /* Modal Styles */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease-out;
        z-index: 100;
        backdrop-filter: blur(5px);
      }
      .modal-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
      .modal-content {
        background: #1a1a1a;
        border: 2px solid #333;
        border-radius: 12px;
        padding: 30px;
        max-width: 90%;
        width: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        transform: scale(0.9);
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      }
      .modal-overlay.active .modal-content {
        transform: scale(1);
      }
      .modal-preview {
        width: 120px;
        height: 240px;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        margin-bottom: 20px;
        filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
      }
      .modal-title {
        font-size: 1.5rem;
        font-weight: bold;
        color: #fff;
        margin-bottom: 5px;
        text-align: center;
      }
      .modal-subtitle {
        color: #888;
        font-size: 1rem;
        margin-bottom: 20px;
      }
      .modal-details {
        display: flex;
        flex-direction: column;
        gap: 5px;
        align-items: center;
        margin-bottom: 20px;
        font-size: 0.9rem;
        color: #aaa;
        text-align: center;
      }
      .modal-close {
        position: absolute;
        top: 15px;
        right: 15px;
        background: transparent;
        border: none;
        color: #666;
        font-size: 1.5rem;
        cursor: pointer;
        line-height: 1;
        padding: 5px;
      }
      .version-controls {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 15px;
      }
      .version-btn {
        background: #333;
        border: 1px solid #555;
        color: #fff;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .version-btn:hover {
        background: #444;
      }
      .modal-close:hover {
        color: #fff;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html" class="back-btn">Back to Game</a>
      <h1>Skin Explorer</h1>
      <div id="search-container">
        <input
          type="text"
          id="search-input"
          placeholder="Search for skins..."
        />
      </div>
      <div class="controls-container">
        <div class="filter-tags" id="filter-tags">
          <button class="filter-btn active" data-tag="all">All</button>
          <button class="filter-btn" data-tag="firstPlace">1st Place</button>
          <button class="filter-btn" data-tag="honorary">Honorary</button>
          <button class="filter-btn" data-tag="competitive">Competitive</button>
          <button class="filter-btn" data-tag="unlockCode">Code</button>
          <button class="filter-btn" data-tag="gameUnlock">Unlock</button>
        </div>
        <select id="sort-select">
          <option value="name_asc">Sort: Name (A-Z)</option>
          <option value="name_desc">Sort: Name (Z-A)</option>
          <option value="rarity_asc">Sort: Rarest First</option>
          <option value="rarity_desc">Sort: Common First</option>
          <option value="artist_asc">Sort: Artist (A-Z)</option>
          <option value="artist_desc">Sort: Artist (Z-A)</option>
        </select>
      </div>
    </header>
    <div id="skins-grid"></div>

    <div id="skin-modal" class="modal-overlay">
      <div class="modal-content">
        <button class="modal-close" onclick="closeSkinModal()">&times;</button>
        <div
          id="version-controls"
          class="version-controls"
          style="display: none"
        >
          <button class="version-btn" onclick="changeVersion(-1)">&lt;</button>
          <span id="version-label" style="font-size: 0.8rem; color: #aaa"
            >v1</span
          >
          <button class="version-btn" onclick="changeVersion(1)">&gt;</button>
        </div>
        <div id="modal-preview" class="modal-preview"></div>
        <div id="modal-title" class="modal-title"></div>
        <div id="modal-subtitle" class="modal-subtitle"></div>
        <div id="modal-details" class="modal-details"></div>
      </div>
    </div>

        },
        skateboard: {
          name: "Skateboard (Sports Edition)",
          copies: "1/5",
          artist: "Torgaar, Chairlord, Ligmadaddy69",
        },
        bike: {
          name: "Mountain Biking (Sports Edition)",
          copies: "1/5",
          artist: "Torgaar, Chairlord, Ligmadaddy69",
        },
      };

      // Initialize new variables (Defaults)
      Object.values(SKIN_DEFINITIONS).forEach((def) => {
        if (typeof def.honorary === "undefined") def.honorary = false;
        if (typeof def.firstPlace === "undefined") def.firstPlace = false;
        if (typeof def.artist === "undefined") def.artist = "Unknown";
        if (typeof def.competitive === "undefined") def.competitive = false;
        if (typeof def.unlockCode === "undefined") def.unlockCode = false;
        if (typeof def.gameUnlock === "undefined") def.gameUnlock = false;
        if (typeof def.forPlayer === "undefined") def.forPlayer = "";
      });

      const modal = document.getElementById("skin-modal");
      const modalPreview = document.getElementById("modal-preview");
      const modalTitle = document.getElementById("modal-title");
      const modalSubtitle = document.getElementById("modal-subtitle");
      const modalDetails = document.getElementById("modal-details");
      const versionControls = document.getElementById("version-controls");
      const versionLabel = document.getElementById("version-label");

      let currentModalSkinId = null;
      let currentSkinData = null;
      let currentVersionIdx = 0;

      function openSkinModal(id, data) {
        currentModalSkinId = id;
        currentSkinData = data;
        modalTitle.textContent = data.name;
        modalSubtitle.textContent =
          data.copies === "N/A" ? "Standard Skin" : `${data.copies} Copies`;

        // Modal Details
        let detailsHtml = `<div>Artist: ${data.artist}</div>`;
        if (data.forPlayer) {
          detailsHtml += `<div style="color: #335699; font-weight: bold;">For: ${data.forPlayer}</div>`;
        }
        if (data.honorary) {
          detailsHtml += `<div class="skin-tag honorary" style="display:inline-block; margin-top:5px;">Honorary</div>`;
        }
        if (data.firstPlace) {
          detailsHtml += `<div class="skin-tag first-place" style="display:inline-block; margin-top:5px;">First Place</div>`;
        }
        if (data.competitive) {
          detailsHtml += `<div class="skin-tag competitive" style="display:inline-block; margin-top:5px;">Competitive</div>`;
        }
        if (data.unlockCode) {
          detailsHtml += `<div class="skin-tag unlock-code" style="display:inline-block; margin-top:5px;">Unlock Code</div>`;
        }
        if (data.gameUnlock) {
          detailsHtml += `<div class="skin-tag game-unlock" style="display:inline-block; margin-top:5px;">Game Unlock</div>`;
        }
        modalDetails.innerHTML = detailsHtml;

        // Handle Versions
        if (data.versions && data.versions.length > 0) {
          currentVersionIdx = data.versions.length - 1; // Default to latest
          versionControls.style.display = "flex";
          updateModalVersionDisplay();
        } else {
          versionControls.style.display = "none";
          updateModalImage(id);
        }

        modal.classList.add("active");
      }

      function updateModalVersionDisplay() {
        const v = currentSkinData.versions[currentVersionIdx];
        versionLabel.textContent = v.name || `v${currentVersionIdx + 1}`;
        updateModalImage(currentModalSkinId, v.img);
      }

      function updateModalImage(id, customImg) {
        if (id === "default") {
          modalPreview.style.backgroundImage = "none";
          modalPreview.style.backgroundColor = "#335699";
          modalPreview.style.borderRadius = "8px";
        } else {
          modalPreview.style.backgroundColor = "transparent";
          const ext = id === "smiley" ? "gif" : "png";
          const img = customImg || `${id}.${ext}`;
          modalPreview.style.backgroundImage = `url('${img}')`;
        }
      }

      function changeVersion(dir) {
        if (!currentSkinData || !currentSkinData.versions) return;
        currentVersionIdx += dir;
        if (currentVersionIdx < 0)
          currentVersionIdx = currentSkinData.versions.length - 1;
        if (currentVersionIdx >= currentSkinData.versions.length)
          currentVersionIdx = 0;
        updateModalVersionDisplay();
      }

      function closeSkinModal() {
        modal.classList.remove("active");
      }

      modal.addEventListener("click", (e) => {
        if (e.target === modal) closeSkinModal();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && modal.classList.contains("active")) {
          closeSkinModal();
        }
      });

      const grid = document.getElementById("skins-grid");
      const searchInput = document.getElementById("search-input");
      const sortSelect = document.getElementById("sort-select");
      const filterBtns = document.querySelectorAll(".filter-btn");

      let currentFilter = "all";

      function renderSkins(filterText = "") {
        grid.innerHTML = "";
        const searchString = filterText.toLowerCase();
        const searchTerms = searchString.split(/\s+/).filter((t) => t);
        const sortMode = sortSelect.value;

        let count = 0;
        let skinsList = Object.entries(SKIN_DEFINITIONS);

        // Filter by Tag
        if (currentFilter !== "all") {
          skinsList = skinsList.filter(([id, data]) => data[currentFilter]);
        }

        // Filter by Search
        skinsList = skinsList.filter(([id, data]) => {
          if (searchTerms.length === 0) return true;
          const searchableText =
            `${data.name} ${id} ${data.artist} ${data.forPlayer}`.toLowerCase();
          return searchTerms.every((term) => searchableText.includes(term));
        });

        // Sort
        skinsList.sort((a, b) => {
          const [idA, dataA] = a;
          const [idB, dataB] = b;

          if (sortMode === "name_asc")
            return dataA.name.localeCompare(dataB.name);
          if (sortMode === "name_desc")
            return dataB.name.localeCompare(dataA.name);
          if (sortMode === "artist_asc")
            return dataA.artist.localeCompare(dataB.artist);
          if (sortMode === "artist_desc")
            return dataB.artist.localeCompare(dataA.artist);

          if (sortMode.startsWith("rarity")) {
            const getScore = (copies) => {
              if (copies === "N/A") return 999;
              const parts = copies.split("/");
              if (parts.length === 2) return parseInt(parts[1]);
              return 100;
            };
            const scoreA = getScore(dataA.copies);
            const scoreB = getScore(dataB.copies);
            if (sortMode === "rarity_asc") return scoreA - scoreB;
            return scoreB - scoreA;
          }
          return 0;
        });

        skinsList.forEach(([id, data]) => {
          let match = true;

          if (match) {
            count++;
            const card = document.createElement("div");
            card.className = "skin-card";
            card.title = data.name;
            card.onclick = () => openSkinModal(id, data);

            const preview = document.createElement("div");
            preview.className = "skin-preview";

            if (id === "default") {
              preview.style.backgroundColor = "#335699";
              preview.style.borderRadius = "4px";
            } else {
              const ext = id === "smiley" ? "gif" : "png";
              preview.style.backgroundImage = `url('${id}.${ext}')`;
            }

            const name = document.createElement("div");
            name.className = "skin-name";
            name.textContent = data.name;

            const copies = document.createElement("div");
            copies.className =
              "skin-copies" + (data.copies === "1/1" ? " legendary" : "");
            copies.textContent = data.copies;

            const tags = document.createElement("div");
            tags.className = "skin-tags";

            if (data.honorary) {
              const t = document.createElement("div");
              t.className = "skin-tag honorary";
              t.textContent = "Honorary";
              tags.appendChild(t);
            }
            if (data.firstPlace) {
              const t = document.createElement("div");
              t.className = "skin-tag first-place";
              t.textContent = "1st Place";
              tags.appendChild(t);
            }
            if (data.competitive) {
              const t = document.createElement("div");
              t.className = "skin-tag competitive";
              t.textContent = "Comp";
              tags.appendChild(t);
            }
            if (data.unlockCode) {
              const t = document.createElement("div");
              t.className = "skin-tag unlock-code";
              t.textContent = "Code";
              tags.appendChild(t);
            }
            if (data.gameUnlock) {
              const t = document.createElement("div");
              t.className = "skin-tag game-unlock";
              t.textContent = "Unlock";
              tags.appendChild(t);
            }

            const artist = document.createElement("div");
            artist.className = "skin-artist";
            artist.textContent = data.artist;

            card.appendChild(preview);
            card.appendChild(name);
            card.appendChild(copies);
            if (tags.children.length > 0) card.appendChild(tags);
            card.appendChild(artist);
            if (data.forPlayer) {
              const forP = document.createElement("div");
              forP.className = "skin-for";
              forP.textContent = "For: " + data.forPlayer;
              card.appendChild(forP);
            }
            grid.appendChild(card);
          }
        });

        if (count === 0) {
          grid.innerHTML = `<div class="no-results">No skins found matching "${filterText}"</div>`;
        }
      }

      searchInput.addEventListener("input", (e) => {
        renderSkins(e.target.value);
      });

      sortSelect.addEventListener("change", () => renderSkins());

      filterBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          filterBtns.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.tag;
          renderSkins();
        });
      });

      // Initial Render
      renderSkins();
    </script>
  </body>
</html>
