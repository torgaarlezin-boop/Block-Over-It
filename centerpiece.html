<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centerpiece Launcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
            user-select: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .app-icon {
            position: absolute;
            width: 96px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 12px;
            border-radius: 20px;
            transition: background 0.2s, transform 0.2s;
            z-index: 10;
        }

        .app-icon:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .app-icon img, .app-icon .icon-placeholder {
            width: 52px;
            height: 52px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .app-icon .icon-placeholder {
            background: rgba(255, 255, 255, 0.15);
            font-size: 24px;
            font-weight: 600;
            color: white;
        }

        .app-icon span {
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .edit-mode .app-icon {
            cursor: move;
            animation: wiggle 0.3s ease-in-out infinite alternate;
        }

        @keyframes wiggle {
            from { transform: rotate(-1deg); }
            to { transform: rotate(1deg); }
        }

        .liquid-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            color: white;
            transition: all 0.3s;
        }

        .liquid-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        #boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease;
        }

        .loading-bar-container {
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 20px;
            overflow: hidden;
            border-radius: 2px;
        }

        .loading-bar {
            height: 100%;
            background: white;
            width: 0%;
            animation: load 2s ease-in-out forwards;
        }

        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }

        /* Lock Screen & Settings Styles */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 9000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .pin-dot {
            width: 16px; height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s;
        }
        .pin-dot.filled {
            background: white;
            border-color: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .wallpaper-preset {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            background-size: cover;
            background-position: center;
        }
        .wallpaper-preset:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .wallpaper-preset.active {
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <!-- Boot Screen -->
    <div id="boot-screen">
        <div class="text-3xl font-light tracking-[0.2em] mb-2">CENTERPIECE</div>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
    </div>

    <!-- Lock Screen -->
    <div id="lock-screen" class="opacity-0">
        <i data-lucide="lock" class="w-12 h-12 text-white/80 mb-6"></i>
        <h2 class="text-2xl font-light mb-8 text-white">Enter PIN</h2>
        <div class="flex gap-4 mb-12" id="pin-dots" style="transition: transform 0.3s">
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
        </div>
        <div class="grid grid-cols-3 gap-4 max-w-[280px]">
            <button class="glass-button w-16 h-16 rounded-full text-xl font-medium" onclick="enterPin('1')">1</button>
            <button class="glass-button w-16 h-16 rounded-full text-xl font-medium" onclick="enterPin('2')">2</button>
            <button class="glass-button w-16 h-16 rounded-full text-xl font-medium" onclick="enterPin('3')">3</button>
            <button class="glass-button w-16 h-16 rounded-full text-xl font-medium" onclick="enterPin('4')">4</button>
            <button class="glass-button w-16 h-16 rounded-full text-xl font-medium" onclick="enterPin('5')">5</button>
            <button class="glass-button w-16 h-16 rounded-full text-xl font-medium" onclick="enterPin('6')">6</button>
            <button class="glass-button w-16 h-16 rounded-full text-xl font-medium" onclick="enterPin('7')">7</button>
            <button class="glass-button w-16 h-16 rounded-full text-xl font-medium" onclick="enterPin('8')">8</button>
            <button class="glass-button w-16 h-16 rounded-full text-xl font-medium" onclick="enterPin('9')">9</button>
            <button class="glass-button w-16 h-16 rounded-full text-xl font-medium text-red-400 flex items-center justify-center" onclick="clearPin()"><i data-lucide="x" class="w-6 h-6"></i></button>
            <button class="glass-button w-16 h-16 rounded-full text-xl font-medium" onclick="enterPin('0')">0</button>
            <button class="glass-button w-16 h-16 rounded-full text-xl font-medium text-blue-400 flex items-center justify-center" onclick="submitPin()"><i data-lucide="arrow-right" class="w-6 h-6"></i></button>
        </div>
        <p id="pin-error" class="text-red-400 mt-6 text-sm opacity-0 transition-opacity">Incorrect PIN</p>
    </div>

    <!-- Top Edit Bar -->
    <div id="top-bar" class="fixed top-0 left-0 right-0 h-16 glass-panel z-40 hidden flex items-center justify-between px-6 slide-down rounded-b-3xl mx-4 mt-2">
        <div class="flex items-center gap-2 text-white/80">
            <i data-lucide="edit-3" class="w-5 h-5"></i>
            <span class="font-medium tracking-wide">Edit Mode Active</span>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="openWallpaperModal()" class="glass-button px-4 py-2 rounded-xl flex items-center gap-2 text-sm font-medium">
                <i data-lucide="image" class="w-4 h-4"></i> Change Wallpaper
            </button>
            <button onclick="alignGrid()" class="glass-button px-4 py-2 rounded-xl flex items-center gap-2 text-sm font-medium">
                <i data-lucide="layout-grid" class="w-4 h-4"></i> Snap to Grid
            </button>
            <div class="w-px h-6 bg-white/20 mx-2"></div>
            <button onclick="toggleEditMode()" class="bg-white/90 text-black px-6 py-2 rounded-xl font-semibold hover:bg-white transition-colors flex items-center gap-2">
                <i data-lucide="check" class="w-4 h-4"></i> Done
            </button>
        </div>
    </div>

    <!-- Desktop Area -->
    <div id="desktop" class="w-full h-full relative" oncontextmenu="handleRightClick(event)">
        <!-- Apps are injected here -->
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="fixed glass-panel rounded-2xl py-2 w-56 hidden z-50 border border-white/20">
        <div id="menu-standard">
            <button onclick="toggleEditMode(); hideContextMenu();" class="w-full text-left px-4 py-2.5 hover:bg-white/10 flex items-center gap-3 text-sm transition-colors">
                <i data-lucide="layout-dashboard" class="w-4 h-4 text-white/70"></i> Edit Layout
            </button>
            <button onclick="openAddShortcutModal(); hideContextMenu();" class="w-full text-left px-4 py-2.5 hover:bg-white/10 flex items-center gap-3 text-sm transition-colors">
                <i data-lucide="plus-circle" class="w-4 h-4 text-white/70"></i> Add Shortcut
            </button>
            <div class="h-px bg-white/10 my-1 mx-2"></div>
            <button onclick="openWallpaperModal(); hideContextMenu();" class="w-full text-left px-4 py-2.5 hover:bg-white/10 flex items-center gap-3 text-sm transition-colors">
                <i data-lucide="wallpaper" class="w-4 h-4 text-white/70"></i> Change Wallpaper
            </button>
            <button onclick="openSettingsModal(); hideContextMenu();" class="w-full text-left px-4 py-2.5 hover:bg-white/10 flex items-center gap-3 text-sm transition-colors">
                <i data-lucide="settings" class="w-4 h-4 text-white/70"></i> Settings
            </button>
        </div>
        <div id="menu-app" class="hidden">
            <button onclick="removeSelectedApp(); hideContextMenu();" class="w-full text-left px-4 py-2.5 hover:bg-red-500/30 text-red-400 flex items-center gap-3 text-sm transition-colors">
                <i data-lucide="trash-2" class="w-4 h-4"></i> Remove Shortcut
            </button>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <!-- Add Shortcut -->
        <div id="add-modal" class="glass-panel w-full max-w-md rounded-3xl p-8 transform scale-95 transition-transform duration-300 hidden absolute">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold flex items-center gap-2">New Shortcut</h2>
                <button onclick="closeModals()" class="text-white/50 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="space-y-4">
                <input type="text" id="shortcut-url" placeholder="https://..." class="liquid-input w-full rounded-xl px-4 py-3 text-sm" oninput="autoFillTitle()">
                <input type="text" id="shortcut-title" placeholder="Title" class="liquid-input w-full rounded-xl px-4 py-3 text-sm">
                <div class="pt-4 flex gap-3">
                    <button onclick="closeModals()" class="flex-1 glass-button py-3 rounded-xl">Cancel</button>
                    <button onclick="saveShortcut()" class="flex-1 bg-white text-black py-3 rounded-xl font-medium">Add</button>
                </div>
            </div>
        </div>

        <!-- Wallpaper -->
        <div id="wallpaper-modal" class="glass-panel w-full max-w-md rounded-3xl p-8 transform scale-95 transition-transform duration-300 hidden absolute">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold">Wallpaper</h2>
                <button onclick="closeModals()" class="text-white/50 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="wallpaper-grid" id="wallpaper-presets-container"></div>
            <input type="text" id="wallpaper-url" placeholder="Custom URL..." class="liquid-input w-full rounded-xl px-4 py-3 text-sm" oninput="clearPresetSelection()">
            <div class="pt-4 flex gap-3">
                <button onclick="closeModals()" class="flex-1 glass-button py-3 rounded-xl">Cancel</button>
                <button onclick="saveWallpaper()" class="flex-1 bg-white text-black py-3 rounded-xl font-medium">Apply</button>
            </div>
        </div>

        <!-- Settings -->
        <div id="settings-modal" class="glass-panel w-full max-w-md rounded-3xl p-8 transform scale-95 transition-transform duration-300 hidden absolute">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold">Settings</h2>
                <button onclick="closeModals()" class="text-white/50 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="space-y-6">
                <div class="glass-panel rounded-xl p-4 flex justify-between items-center">
                    <div class="text-sm">Lock Screen PIN</div>
                    <button onclick="togglePinSetup()" id="pin-toggle-btn" class="glass-button px-4 py-2 rounded-lg text-xs font-medium">Set PIN</button>
                </div>
                <div id="pin-setup-area" class="hidden space-y-3">
                    <input type="password" id="new-pin" maxlength="4" class="liquid-input w-full rounded-xl px-4 py-3 text-center tracking-[1em]" placeholder="••••">
                    <button onclick="savePin()" class="w-full bg-white text-black py-3 rounded-xl text-sm font-medium">Save PIN</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- State & Config ---
        const defaultBackground = `radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.4), transparent 50%), radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.4), transparent 50%), radial-gradient(circle at 50% 80%, rgba(236, 72, 153, 0.3), transparent 50%)`;
        
        const wallpaperPresets = [
            { id: 'default', name: 'Liquid Glass', style: 'background-image: ' + defaultBackground, value: '' },
            { id: 'neon', name: 'Neon Gradient', style: 'background-image: url("https://images.unsplash.com/photo-1557682250-33bd709cbe85?q=80&w=1000")', value: 'url("https://images.unsplash.com/photo-1557682250-33bd709cbe85?q=80&w=1000")' },
            { id: 'mountains', name: 'Mountains', style: 'background-image: url("https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1000")', value: 'url("https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1000")' },
            { id: 'ocean', name: 'Deep Ocean', style: 'background-image: url("https://images.unsplash.com/photo-1505118380757-91f5f5632de0?q=80&w=1000")', value: 'url("https://images.unsplash.com/photo-1505118380757-91f5f5632de0?q=80&w=1000")' },
            { id: 'abstract', name: 'Abstract', style: 'background-image: url("https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000")', value: 'url("https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000")' },
            { id: 'dark', name: 'Dark Void', style: 'background-color: #000; background-image: none;', value: 'none' }
        ];

        // Specific Initial Starter Apps
        let apps = JSON.parse(localStorage.getItem('centerpiece_apps')) || [
            { 
                id: 'app-boit', 
                title: 'Block Over It', 
                url: 'index.html', 
                icon: 'blockoverit.png', 
                x: 100, y: 120 
            },
            { 
                id: 'app-bap', 
                title: 'Block Architect Pro', 
                url: 'Block Architect Pro.html', 
                icon: 'B', 
                x: 220, y: 120 
            }
        ];

        let savedWallpaper = localStorage.getItem('centerpiece_wallpaper') || '';
        let savedPin = localStorage.getItem('centerpiece_pin') || null;
        let isLocked = savedPin !== null;
        let currentPinEntry = '';
        let isEditMode = false;
        let draggingApp = null;
        let dragOffset = { x: 0, y: 0 };
        let selectedAppIdForMenu = null;

        // --- Core Functions ---
        function saveAppsToStorage() {
            localStorage.setItem('centerpiece_apps', JSON.stringify(apps));
        }

        function renderApps() {
            const desktop = document.getElementById('desktop');
            desktop.innerHTML = '';
            
            apps.forEach(app => {
                const el = document.createElement('div');
                el.className = 'app-icon';
                el.id = app.id;
                el.style.left = `${app.x}px`;
                el.style.top = `${app.y}px`;
                
                let iconContent = '';
                // Logic for icon handling
                if (app.url === 'index.html') {
                    iconContent = `<img src="blockoverit.png" alt="${app.title}" onerror="this.outerHTML='<div class=\\'icon-placeholder\\'>BOI</div>'">`;
                } else if (app.url === 'Block Architect Pro.html' || app.icon === 'B') {
                    iconContent = `<div class="icon-placeholder">B</div>`;
                } else {
                    // Try favicon for others
                    try {
                        let domain = new URL(app.url).hostname;
                        iconContent = `<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=128" alt="${app.title}">`;
                    } catch(e) {
                        iconContent = `<div class="icon-placeholder">${app.title.charAt(0)}</div>`;
                    }
                }

                el.innerHTML = `${iconContent}<span>${app.title}</span>`;
                el.addEventListener('mousedown', (e) => startDrag(e, app));
                el.addEventListener('click', (e) => {
                    if (!isEditMode) window.open(app.url, '_blank');
                });
                el.addEventListener('contextmenu', (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    if(!isEditMode) showContextMenu(e, 'app', app.id);
                });

                desktop.appendChild(el);
            });
        }

        // --- UI Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            applySavedWallpaper();
            initWallpaperPresets();
            updateSettingsUI();
            
            setTimeout(() => {
                const boot = document.getElementById('boot-screen');
                boot.style.opacity = '0';
                setTimeout(() => {
                    boot.style.display = 'none';
                    if (isLocked) showLockScreen();
                    else renderApps();
                }, 1500);
            }, 2500);

            document.addEventListener('mousemove', handleDrag);
            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#context-menu')) hideContextMenu();
            });
        });

        // --- Dragging ---
        function startDrag(e, app) {
            if (!isEditMode || e.button !== 0) return;
            draggingApp = app;
            const el = document.getElementById(app.id);
            const rect = el.getBoundingClientRect();
            dragOffset = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            el.style.zIndex = 1000;
        }

        function handleDrag(e) {
            if (!draggingApp) return;
            const el = document.getElementById(draggingApp.id);
            let newX = e.clientX - dragOffset.x;
            let newY = e.clientY - dragOffset.y;
            newX = Math.max(20, Math.min(newX, window.innerWidth - 116));
            newY = Math.max(80, Math.min(newY, window.innerHeight - 124));
            el.style.left = `${newX}px`;
            el.style.top = `${newY}px`;
        }

        function stopDrag() {
            if (!draggingApp) return;
            const el = document.getElementById(draggingApp.id);
            el.style.zIndex = '';
            draggingApp.x = parseInt(el.style.left);
            draggingApp.y = parseInt(el.style.top);
            draggingApp = null;
            saveAppsToStorage();
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.getElementById('top-bar').classList.toggle('hidden', !isEditMode);
            document.getElementById('desktop').classList.toggle('edit-mode', isEditMode);
        }

        function alignGrid() {
            const gapX = 140, gapY = 160, cols = Math.floor(window.innerWidth / gapX);
            apps.forEach((app, i) => {
                app.x = 60 + ((i % cols) * gapX);
                app.y = 120 + (Math.floor(i / cols) * gapY);
            });
            renderApps();
            saveAppsToStorage();
        }

        // --- Context Menu & Modals ---
        function showContextMenu(e, type, appId = null) {
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.classList.remove('hidden');
            document.getElementById('menu-standard').classList.toggle('hidden', type !== 'standard');
            document.getElementById('menu-app').classList.toggle('hidden', type !== 'app');
            selectedAppIdForMenu = appId;
            menu.style.left = `${Math.min(e.clientX, window.innerWidth - 230)}px`;
            menu.style.top = `${Math.min(e.clientY, window.innerHeight - 150)}px`;
        }

        function hideContextMenu() {
            const menu = document.getElementById('context-menu');
            menu.classList.add('hidden');
            menu.style.display = 'none';
        }

        function handleRightClick(e) {
            e.preventDefault();
            if (!e.target.closest('.app-icon')) showContextMenu(e, 'standard');
        }

        function removeSelectedApp() {
            apps = apps.filter(a => a.id !== selectedAppIdForMenu);
            renderApps();
            saveAppsToStorage();
        }

        function showOverlay(id) {
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.remove('hidden');
            document.getElementById(id).classList.remove('hidden');
            void overlay.offsetWidth;
            overlay.classList.add('opacity-100');
            document.getElementById(id).classList.add('scale-100');
        }

        function closeModals() {
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.remove('opacity-100');
            ['add-modal', 'wallpaper-modal', 'settings-modal'].forEach(id => {
                document.getElementById(id).classList.remove('scale-100');
                document.getElementById(id).classList.add('scale-95');
            });
            setTimeout(() => {
                overlay.classList.add('hidden');
                ['add-modal', 'wallpaper-modal', 'settings-modal'].forEach(id => document.getElementById(id).classList.add('hidden'));
            }, 300);
        }

        function openAddShortcutModal() { showOverlay('add-modal'); }
        function openWallpaperModal() { showOverlay('wallpaper-modal'); }
        function openSettingsModal() { updateSettingsUI(); showOverlay('settings-modal'); }

        function saveShortcut() {
            let url = document.getElementById('shortcut-url').value.trim();
            const title = document.getElementById('shortcut-title').value.trim() || 'New App';
            if (!url) return;
            if (!url.includes('://') && !url.endsWith('.html')) url = 'https://' + url;
            apps.push({ id: 'app-' + Date.now(), title, url, x: 100, y: 120 });
            renderApps();
            saveAppsToStorage();
            closeModals();
        }

        // --- Wallpaper & PIN Logic ---
        function initWallpaperPresets() {
            const container = document.getElementById('wallpaper-presets-container');
            wallpaperPresets.forEach(p => {
                const d = document.createElement('div');
                d.className = 'wallpaper-preset';
                d.style = p.style;
                d.onclick = () => {
                    document.querySelectorAll('.wallpaper-preset').forEach(el => el.classList.remove('active'));
                    d.classList.add('active');
                    savedWallpaper = p.value;
                };
                container.appendChild(d);
            });
        }

        function saveWallpaper() {
            const custom = document.getElementById('wallpaper-url').value.trim();
            if (custom) savedWallpaper = `url('${custom}')`;
            localStorage.setItem('centerpiece_wallpaper', savedWallpaper);
            applySavedWallpaper();
            closeModals();
        }

        function applySavedWallpaper() {
            if (savedWallpaper === 'none') { document.body.style.backgroundImage = 'none'; document.body.style.backgroundColor = '#000'; }
            else { document.body.style.backgroundImage = savedWallpaper || defaultBackground; }
        }

        function updateSettingsUI() {
            const btn = document.getElementById('pin-toggle-btn');
            btn.textContent = savedPin ? 'Remove PIN' : 'Set PIN';
            btn.className = savedPin ? 'glass-button px-4 py-2 rounded-lg text-xs font-medium bg-red-500/20 text-red-400' : 'glass-button px-4 py-2 rounded-lg text-xs font-medium';
        }

        function togglePinSetup() {
            if (savedPin) { savedPin = null; localStorage.removeItem('centerpiece_pin'); updateSettingsUI(); }
            else document.getElementById('pin-setup-area').classList.toggle('hidden');
        }

        function savePin() {
            const p = document.getElementById('new-pin').value;
            if (p.length === 4) { savedPin = p; localStorage.setItem('centerpiece_pin', p); updateSettingsUI(); document.getElementById('pin-setup-area').classList.add('hidden'); }
        }

        function showLockScreen() {
            const ls = document.getElementById('lock-screen');
            ls.style.display = 'flex';
            setTimeout(() => ls.classList.remove('opacity-0'), 50);
        }

        function enterPin(d) {
            if (currentPinEntry.length < 4) {
                currentPinEntry += d;
                updatePinDots();
                if (currentPinEntry.length === 4) setTimeout(submitPin, 200);
            }
        }

        function updatePinDots() {
            document.querySelectorAll('.pin-dot').forEach((dot, i) => dot.classList.toggle('filled', i < currentPinEntry.length));
        }

        function submitPin() {
            if (currentPinEntry === savedPin) {
                document.getElementById('lock-screen').classList.add('opacity-0');
                setTimeout(() => { document.getElementById('lock-screen').style.display = 'none'; isLocked = false; renderApps(); }, 500);
            } else {
                document.getElementById('pin-error').style.opacity = '1';
                currentPinEntry = '';
                setTimeout(() => { updatePinDots(); document.getElementById('pin-error').style.opacity = '0'; }, 1000);
            }
        }

        function clearPin() { currentPinEntry = ''; updatePinDots(); }
    </script>
</body>
</html>
