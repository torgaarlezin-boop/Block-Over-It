<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>Block Over It</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" href="blockoverit.png" />
    <style>
      body {
        background: #111;
        color: #fff;
        font-family: "Courier New", Courier, monospace;
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }

      /* --- Game Grid Styles --- */
      .background {
        table-layout: fixed;
        border-spacing: 0;
        border-collapse: collapse;
        margin-top: auto;
      }

      .background td {
        padding: 0;
        box-sizing: border-box;
      }

      .lava {
        background: #e55;
      }
      .wall {
        background: #444;
        border: solid 3px #333;
        box-sizing: border-box;
      }
      .visual-wall {
        background: #444;
        border: solid 3px #333;
        box-sizing: border-box;
      }

      .actor {
        position: absolute;
      }

      .coin {
        background: #e2e838;
        border-radius: 50%;
        border: 1px solid #c2c828;
      }

      /* Bonus Coin Style - Flattened as requested */
      .bonus-coin {
        background: #335699;
        border-radius: 50%;
        z-index: 5;
      }
      /* Alternate visuals for Bonus Coin (from blockoverit(1).html) */
      .bonus-coin-alt-visuals {
        border: 2px solid #fff;
        box-shadow: 0 0 8px #33f;
      }

      .player {
        background: #335699;
        box-shadow: none;
      }

      .lost .player {
        background: #a04040;
      }
      .won .player {
        background: #2ecc71;
      }

      .moving-block {
        background: #777;
        border: 3px solid #555;
        box-sizing: border-box;
        color: #fff;
        font-weight: bold;
      }

      .falling-block {
        background: #444;
        border: 3px solid #333;
        box-sizing: border-box;
      }

      .breakable-block {
        background-image: url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iOCIgaGVpZ2h0PSI4IiB2aWV3Qm94PSIwIDAgOCA4IiBmaWxsPSJub25lIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSI4IiBoZWlnaHQ9IjgiIGZpbGw9IiM2NDY0NjQiLz48Y2lyY2xlIGN4PSI2LjUiIGN5PSI1LjUiIHI9IjAuNSIgZmlsbD0iIzQ0NDQ0NCIvPjxjaXJjbGUgY3g9IjIuNSIgY3k9IjYuNSIgcj0iMC41IiBmaWxsPSIjNDQ0NDQ0Ii8+PGNpcmNsZSBjeD0iNC41IiBjeT0iMy41IiByPSIwLjUiIGZpbGw9IiM0NDQ0NDQiLz48Y2lyY2xlIGN4PSIxLjUiIGN5PSIyLjUiIHI9IjAuNSIgZmlsbD0iIzQ0NDQ0NCIvPjxjaXJjbGUgY3g9IjUuNSIgY3k9IjAuNSIgcj0iMC41IiBmaWxsPSIjNDQ0NDQ0Ii8+PC9zdmc+");
        border: 3px solid #555;
        box-sizing: border-box;
      }

      .spike-block,
      .wall-block,
      .spike-block-u,
      .spike-block-l,
      .spike-block-r {
        background: #444;
        border: 3px solid #333;
        box-sizing: border-box;
      }
      /* Hide text content for these in game if any */
      .spike-block,
      .wall-block,
      .spike-block-u,
      .spike-block-l,
      .spike-block-r {
        color: transparent;
      }

      .breakable-block.triggered {
        animation: shake 0.4s infinite;
      }

      .jump-pad {
        background: #590059;
        border: 2px solid #d946ef;
        box-sizing: border-box;
        border-radius: 4px;
        position: relative;
        box-shadow: inset 0 0 10px #d946ef;
      }
      .jump-pad::after {
        content: "";
        position: absolute;
        top: 20%;
        left: 20%;
        right: 20%;
        bottom: 20%;
        background: #d946ef;
        border-radius: 50%;
        box-shadow: 0 0 5px #f0abfc;
      }
      .grinder {
        background-color: #333;
        background-image:
          linear-gradient(
            90deg,
            transparent 30%,
            #888 30%,
            #888 70%,
            transparent 70%
          ),
          repeating-linear-gradient(
            0deg,
            #222 0px,
            #222 4px,
            #aaa 4px,
            #aaa 8px
          );
        background-size:
          100% 100%,
          40% 100%;
        background-position:
          center center,
          center 0;
        background-repeat: no-repeat;
        border: none;
        z-index: 5;
        animation: sawSpin 0.05s linear infinite;
      }
      .grinder.grinding {
        animation: shake 0.1s infinite;
      }

      @keyframes sawSpin {
        0% {
          background-position:
            center center,
            center 0px;
        }
        100% {
          background-position:
            center center,
            center 8px;
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(1px, 1px);
        }
      }

      .rising-lava {
        background: #d32f2f;
        box-sizing: border-box;
        box-shadow: 0 0 20px #d32f2f;
        background: repeating-linear-gradient(
          45deg,
          #d32f2f,
          #d32f2f 10px,
          #b71c1c 10px,
          #b71c1c 20px
        );
        animation: rising-lava-anim 0.8s linear infinite;
      }

      @keyframes rising-lava-anim {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 0 20px;
        }
      }

      .spike-visual {
        width: 0;
        height: 0;
        border-style: solid;
        border-color: transparent;
        border-bottom-color: #aaa;
      }
      .spike-visual.spike-u {
        border-bottom-color: transparent;
        border-top-color: #aaa;
        border-top-style: solid;
      }

      .slide-right {
        background: linear-gradient(to top left, #444 50%, transparent 0);
      }

      .slide-left {
        background: linear-gradient(to top right, #444 50%, transparent 0);
      }

      .game {
        position: relative;
        overflow: auto;
        width: 100vw;
        min-height: 100vh;
        height: 100vh;
        background: #222;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        /* Camera Fix: Hide overflow so we can use transform for camera */
        overflow: hidden;
      }

      /* Zoomed out state */
      .game.zoomed-out .world {
        /* Transform is handled in JS, but we ensure origin */
        transform-origin: center center;
        transition: transform 0.2s ease-out;
      }

      /* --- Custom Popup Styles --- */
      .popup-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .popup {
        position: relative;
        background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
        border: 3px solid #335699;
        border-radius: 8px;
        padding: 40px;
        max-width: 500px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        animation: popupSlide 0.3s ease-out;
      }

      @keyframes popupSlide {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .popup-title {
        font-size: 1.8rem;
        color: #335699;
        margin-bottom: 15px;
        text-transform: uppercase;
        font-weight: bold;
        letter-spacing: 2px;
      }

      .popup-message {
        font-size: 1.1rem;
        color: #ccc;
        margin-bottom: 30px;
        line-height: 1.5;
      }

      .popup-buttons {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .popup-btn {
        background: #335699;
        border: 2px solid #2a4a7a;
        color: #fff;
        padding: 12px 30px;
        font-size: 1rem;
        cursor: pointer;
        border-radius: 4px;
        text-transform: uppercase;
        font-weight: bold;
        transition: all 0.2s;
        font-family: inherit;
      }

      .popup-btn:hover {
        background: #3d6ab8;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(51, 86, 153, 0.4);
      }

      .popup-btn.secondary {
        background: #555;
        border-color: #777;
      }

      .popup-btn.secondary:hover {
        background: #666;
      }

      .popup-close {
        position: absolute;
        top: 10px;
        right: 10px;
        background: transparent;
        border: none;
        color: #666;
        font-size: 1.5rem;
        cursor: pointer;
        line-height: 1;
      }
      .popup-close:hover {
        color: #fff;
      }

      /* --- Main Menu Styles --- */
      #main-menu {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(17, 17, 17, 0.98);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 150px;
        overflow: hidden;
        box-sizing: border-box;
        z-index: 100;
      }

      .news-banner {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        background: #335699;
        color: white;
        padding: 8px 0;
        text-align: center;
        font-size: 0.9rem;
        cursor: pointer;
        z-index: 120;
        overflow: hidden;
        height: 35px; /* Fixed height */
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #news-banner-content {
        transition: opacity 0.5s ease-in-out;
      }

      h1 {
        font-size: clamp(2.5rem, 5vw, 4rem);
        margin-bottom: 20px;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 5px;
        text-shadow: 4px 4px 0px #335699;
        text-align: center;
      }

      h2 {
        font-size: clamp(1.5rem, 3vw, 2rem);
        margin-bottom: 30px;
        color: #ccc;
        text-transform: uppercase;
      }

      .menu-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        width: 100%;
        max-width: 800px;
        flex: 1;
        min-height: 0;
        margin-bottom: 20px;
        padding-bottom: 80px;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 10px;
      }

      /* Custom Scrollbar for Menu Container */
      .menu-container::-webkit-scrollbar {
        width: 8px;
      }
      .menu-container::-webkit-scrollbar-track {
        background: #111;
      }
      .menu-container::-webkit-scrollbar-thumb {
        background: #333;
        border: 1px solid #555;
        border-radius: 4px;
      }

      .level-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        margin-bottom: 20px;
      }

      /* Generic Button Style */
      .btn {
        background: #333;
        border: 2px solid #555;
        color: white;
        font-family: inherit;
        font-size: clamp(1rem, 1.5vw, 1.5rem);
        cursor: pointer;
        padding: clamp(10px, 1.5vw, 15px) clamp(20px, 3vw, 30px);
        min-width: clamp(150px, 20vw, 200px);
        text-transform: uppercase;
        transition: all 0.2s;
      }

      .btn:hover:not(:disabled) {
        background: #444;
        border-color: #335699;
        transform: translateY(-2px);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* Level Select Button specific */
      .level-btn {
        width: 80px;
        height: 80px;
        font-size: 2rem;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .coin-badge {
        position: absolute;
        bottom: 5px;
        right: 5px;
        width: 12px;
        height: 12px;
        background: #335699;
        border-radius: 50%;
        display: none;
      }

      .controls-hint {
        position: absolute;
        bottom: 30px;
        color: #666;
        font-size: 0.9rem;
      }

      .hud {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 50;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        padding: 10px 15px;
        border-radius: 4px;
        display: none;
        font-size: 14px;
        pointer-events: auto;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }

      /* File Input styling */
      #file-input {
        display: none;
      }
      .file-label {
        display: inline-block;
        background: #335699;
        padding: 10px 20px;
        cursor: pointer;
        margin-top: 20px;
        border: 2px solid #fff;
      }
      .delete-btn {
        background: #a44;
        border: 1px solid #f66;
        font-size: 0.8rem;
        padding: 5px;
        min-width: auto;
        margin-left: 10px;
      }

      .custom-level-row {
        display: flex;
        align-items: center;
        gap: 15px;
        background: #1a1a1a;
        padding: 15px;
        border: 2px solid #333;
        width: 100%;
        max-width: 700px;
        justify-content: space-between;
        border-radius: 4px;
        transition: all 0.2s;
      }

      .custom-level-row:hover {
        border-color: #555;
        background: #222;
      }

      .custom-level-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .custom-level-name {
        font-size: 1.2rem;
        font-weight: bold;
        color: #fff;
      }

      .custom-level-details {
        display: flex;
        gap: 15px;
        font-size: 0.9rem;
        color: #aaa;
      }

      .custom-level-detail-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .custom-level-status {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .status-badge {
        padding: 3px 8px;
        border-radius: 3px;
        font-size: 0.8rem;
        font-weight: bold;
        text-transform: uppercase;
      }

      .status-beaten {
        background: #2ecc71;
        color: #000;
      }

      .status-blue-coin {
        background: #335699;
        color: #fff;
      }

      .custom-level-actions {
        display: flex;
        gap: 8px;
      }

      #timer-display {
        position: absolute;
        top: 50px;
        left: 20px;
        font-family: monospace;
        font-size: 1.5rem;
        color: #ffd700;
        display: none;
        z-index: 50;
      }

      #highscore-display {
        position: absolute;
        top: 80px;
        left: 20px;
        font-family: monospace;
        font-size: 1rem;
        color: #aaa;
        display: none;
        z-index: 50;
      }

      #confetti-canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 200;
      }

      #restart-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 60;
        display: none;
        padding: 10px 20px;
        padding: 0;
        font-size: 1rem;
        min-width: auto;
        width: 44px;
        height: 44px;
        align-items: center;
        justify-content: center;
      }

      /* Settings Button */
      .settings-btn {
        position: absolute;
        bottom: 20px;
        right: 20px;
        background: #333;
        border: 2px solid #555;
        color: white;
        font-family: inherit;
        font-size: 1rem;
        cursor: pointer;
        padding: 10px 20px;
        text-transform: uppercase;
        transition: all 0.2s;
        z-index: 110;
      }
      .settings-btn:hover {
        background: #444;
        border-color: #335699;
        transform: scale(1.05);
      }

      /* Editor Button */
      .editor-btn {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: #333;
        border: 2px solid #555;
        color: white;
        font-family: inherit;
        font-size: 1rem;
        cursor: pointer;
        padding: 10px 20px;
        text-transform: uppercase;
        transition: all 0.2s;
        z-index: 110;
      }
      .editor-btn:hover {
        background: #444;
        border-color: #335699;
        transform: scale(1.05);
      }

      /* Notification Dot */
      .notif-dot {
        position: absolute;
        top: -5px;
        right: -5px;
        width: 12px;
        height: 12px;
        background: #3b82f6;
        border-radius: 50%;
        border: 2px solid #333;
        display: none;
      }

      /* Top Left Controls */
      .top-left-controls {
        position: absolute;
        top: 55px;
        left: 20px;
        display: flex;
        gap: 15px;
        z-index: 110;
      }

      /* Leaderboard Button */
      .leaderboard-btn {
        position: relative;
        top: auto;
        left: auto;
        background: #333;
        border: 2px solid #555;
        color: white;
        font-family: inherit;
        font-size: 1rem;
        cursor: pointer;
        padding: 10px 20px;
        text-transform: uppercase;
        transition: all 0.2s;
        z-index: 110;
      }
      .leaderboard-btn:hover {
        background: #444;
        border-color: #335699;
        transform: scale(1.05);
      }

      /* Awards Button */
      .awards-btn {
        background: #333;
        border: 2px solid #555;
        color: white;
        font-family: inherit;
        font-size: 1rem;
        cursor: pointer;
        padding: 10px 20px;
        text-transform: uppercase;
        transition: all 0.2s;
      }
      .awards-btn:hover {
        background: #444;
        border-color: #335699;
        transform: scale(1.05);
      }

      /* Login Button */
      .login-btn {
        position: absolute;
        top: 55px;
        right: 20px;
        background: #333;
        border: 2px solid #555;
        color: white;
        font-family: inherit;
        font-size: 1rem;
        cursor: pointer;
        padding: 0;
        width: auto;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        overflow: hidden;
        white-space: nowrap;
        max-width: 44px;
        text-transform: uppercase;
        justify-content: center;
        transition:
          max-width 0.4s ease,
          background 0.2s,
          border-color 0.2s;
        z-index: 110;
      }
      .login-btn:hover {
        background: #444;
        border-color: #335699;
        max-width: 300px;
        padding-right: 20px;
      }
      .login-icon {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .login-text {
        opacity: 0;
        transition: opacity 0.3s ease 0.1s;
        margin-left: 5px;
      }
      .login-btn:hover .login-text {
        opacity: 1;
      }

      .feedback-btn {
        position: absolute;
        top: 55px;
        right: 75px;
        width: 44px;
        height: 44px;
        background: #333;
        border: 2px solid #555;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        z-index: 110;
      }
      .feedback-btn:hover {
        background: #444;
        border-color: #335699;
      }

      .bottom-controls {
        position: absolute;
        bottom: 20px;
        right: 20px;
        display: flex;
        gap: 15px;
        align-items: center;
        z-index: 110;
      }

      /* Toggle Switch */
      .toggle-btn {
        width: 60px;
        height: 30px;
        background: #333;
        border: 2px solid #555;
        position: relative;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-block;
        vertical-align: middle;
        margin-left: 10px;
      }
      .toggle-btn.active {
        background: #335699;
        border-color: #5588cc;
      }
      .toggle-slider {
        width: 20px;
        height: 20px;
        background: #fff;
        position: absolute;
        top: 3px;
        left: 3px;
        transition: all 0.2s;
        box-shadow: 2px 2px 0 #000;
      }
      .toggle-btn.active .toggle-slider {
        left: 33px;
      }

      /* Settings Close Button */
      .settings-close-btn {
        position: absolute;
        top: 40px;
        right: 40px;
        background: transparent;
        border: none;
        color: #fff;
        font-size: 3rem;
        cursor: pointer;
        line-height: 1;
        z-index: 120;
        transition:
          transform 0.2s,
          color 0.2s;
      }
      .settings-close-btn:hover {
        color: #335699;
        transform: scale(1.1);
      }

      /* Custom Level Popup */
      .cl-popup-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
      }
      .cl-popup {
        background: #1a1a1a;
        border: 2px solid #333;
        width: 90%;
        max-width: 600px;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        animation: popupSlide 0.3s ease-out;
      }
      .cl-header {
        background: #222;
        padding: 20px;
        border-bottom: 1px solid #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .cl-title {
        font-size: 1.5rem;
        font-weight: bold;
        color: #fff;
      }
      .cl-close {
        background: none;
        border: none;
        color: #666;
        font-size: 2rem;
        cursor: pointer;
        line-height: 1;
      }
      .cl-close:hover {
        color: #fff;
      }
      .cl-body {
        padding: 20px;
        color: #ccc;
      }
      .cl-meta {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        align-items: center;
      }
      .cl-desc {
        background: #111;

      .cl-stats {

      .cl-stat-box {
        background: #222;
        padding: 10px;
        border-radius: 4px;
        text-align: center;

        font-size: 0.7rem;

        margin-bottom: 4px;

        height: 14px;
        background: #333;
        border-radius: 2px;
      }
      .diff-seg.active {
        background: #e55;
        box-shadow: 0 0 5px #e55;

      /* Blocky Volume Slider */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        background: transparent;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 20px;
        width: 20px;
        background: #335699;
        border: 2px solid #fff;
        border-radius: 0;
        cursor: pointer;
        margin-top: -6px; /* Centered on 12px track */
        box-shadow: 4px 4px 0 #000;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        width: 100%;
        height: 12px;
        cursor: pointer;
        background: #555;
        border: 2px solid #999;
      }
      /* Firefox Support */
      input[type="range"]::-moz-range-thumb {
        height: 20px;
        width: 20px;
        background: #335699;
        border: 2px solid #fff;
        border-radius: 0;
        cursor: pointer;
        box-shadow: 4px 4px 0 #000;
      }
      input[type="range"]::-moz-range-track {
        width: 100%;
        height: 12px;
        cursor: pointer;
        background: #555;
        border: 2px solid #999;
      }

      /* Practice Marker */
      .practice-marker {

      /* Beats Button */
      .beats-btn {

        padding: 10px 20px;

        background: #444;
        border-color: #335699;
        transform: scale(1.05);
      }

      /* Credits Button */
      .credits-btn {

        bottom: 20px;
        right: 300px; /* Positioned between Beats and News */
        background: #333;
        border: 2px solid #555;
        color: white;
        font-family: inherit;
        font-size: 1rem;
        cursor: pointer;
        padding: 10px 20px;
        text-transform: uppercase;
        transition: all 0.2s;
        z-index: 110;
      }
      .credits-btn:hover {
        background: #444;
        border-color: #335699;
        transform: scale(1.05);
      }

      /* News Button */
      .news-btn {
        position: absolute;
        bottom: 20px;
        right: 440px;
        background: #333;
        border: 2px solid #555;
        color: white;
        font-family: inherit;
        font-size: 1rem;
        cursor: pointer;
        padding: 10px 20px;
        text-transform: uppercase;
        transition: all 0.2s;
        z-index: 110;

      /* Beats Menu Specifics */

      .progress-container {

        background: rgba(255, 255, 255, 0.1);

      }

        /* Center Campaign Button (Larger) */

        /* Mobile Beats Button */
        #mobile-beats-btn {

          align-items: center;
          justify-content: center;

        }
        #mobile-beats-btn svg {
          width: 30px;
          height: 30px;
          fill: currentColor;
        }
      }

      /* Mobile Landscape Optimizations */
      @media screen and (orientation: landscape) and (max-height: 500px) {
        #main-menu {

      /* Global Mobile Mode Overrides (Apply regardless of screen width if class is present) */
      .mobile-mode .bottom-controls,

      .stats-grid {

      /* Accordion Styles */

      .leaderboard-card.is-me:hover {
        background-color: #253550 !important;

        padding-left: 12px !important;
      }

      .practice-controls {
        position: absolute;
        top: 70px;
        right: 20px;
        display: none;
        flex-direction: column;
        gap: 10px;
        z-index: 60;
      }
      .practice-btn {
        background: #333;
        border: 2px solid #555;
        color: #fff;
        padding: 8px 12px;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.8rem;
        text-transform: uppercase;
        transition: all 0.2s;
      }
      .practice-btn:hover {
        background: #444;
        border-color: #335699;
      }

      /* Mobile Practice Controls */
      .mobile-mode .practice-controls {
        top: 10px;
        right: 10px;
        flex-direction: row;
        gap: 8px;
      }
      .mobile-mode .practice-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        font-size: 0; /* Hide text */
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #fff;
      }
      .mobile-mode .practice-btn::after {
        font-size: 1.2rem;
        color: #fff;
      }
      .mobile-mode .practice-btn:nth-child(1)::after {
        content: "⚑";
      }
      .mobile-mode .practice-btn:nth-child(2)::after {
        content: "↺";
      }
      .mobile-mode .practice-btn:nth-child(3)::after {
        content: "✕";
      }

      .top-notification {
        position: fixed;
        top: 20px;

        transform: translateX(-50%);

              .from("users")
              .select("username")
              .eq("username", username)
              .single();
            if (existing)
              return showPopup("ERROR", "Username already taken.", () => {});

            const saveData = {
              gameState,
              customLevels,
              customLevelsProgress,
              highscores,
              gameSettings,
            };

            let initialSkins = ["default"];
            if (withReward) initialSkins.push("dino");

            const { error } = await _supabase
              .from("users")

            showPopup(
              "SUCCESS",

          } else {

              .from("users")
              .select("*")
              .eq("username", username)
              .eq("password", password)
              .single();
            if (error || !data)
              return showPopup("ERROR", "Invalid credentials.", () => {});

            currentUser = username;
            if (currentUser === "test") {
              currentUserSkins = Object.keys(SKIN_DEFINITIONS);
            } else if (data.skins) currentUserSkins = data.skins;
            if (data.data) {

                gameState.unlockedLevel = Math.max(

                gameState.unlockedLevelCh2 = Math.max(
                  gameState.unlockedLevelCh2,

                gameState.unlockedLevelCh3 = Math.max(

                gameState.unlockedLevelCh5 = Math.max(
                  gameState.unlockedLevelCh5,
                  d.gameState.unlockedLevelCh5 || 0,
                );
                if (d.gameState.chapter1Beaten) gameState.chapter1Beaten = true;
                if (d.gameState.chapter2Beaten) gameState.chapter2Beaten = true;
                if (d.gameState.chapter3Beaten) gameState.chapter3Beaten = true;

              if (d.customLevelsProgress)

              if (d.highscores) {
                for (const key in d.highscores) {
                  if (!highscores[key] || d.highscores[key] < highscores[key])
                    highscores[key] = d.highscores[key];

              if (d.customLevels) customLevels = d.customLevels;
              if (d.gameSettings)

              saveGame();
              saveCustomLevels();
              saveCustomLevelsProgress();

              .from("codes")
              .update({ uses_left: codeData.uses_left - 1 })

      // Synth

      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      let bgmOscillator = null;
      let synthGainNode = null;
      let currentSynthId = 0;
      let currentAudio = null;
      let currentPlayingTrackId = null;
      let isMusicPaused = false;
      let isTransitioning = false;
      let fadeInterval = null;
      let transitionTimeout = null;
      let beatsUpdateInterval = null;
      let menuMusicState = { trackId: "synth", time: 0 };
      let synthVolumeScale = 1.0;
      let synthStartTime = 0;

      function togglePause() {
        isMusicPaused = !isMusicPaused;
        if (isMusicPaused) {
          if (currentAudio) currentAudio.pause();
          if (bgmOscillator) {
            if (synthGainNode) synthGainNode.gain.value = 0;
          }
        } else {
          if (currentAudio) currentAudio.play();
          else if (currentPlayingTrackId === "synth") {
            if (synthGainNode)
              synthGainNode.gain.value = 0.02 * (gameSettings.volume / 100);
          }
        }
        if (currentMenuView === "beats-menu") showMenu("beats-menu");
      }

      function getNextPlaylistTrack() {
        const playlist = gameSettings.playlist || [];
        if (playlist.length === 0) return "synth";

        if (gameSettings.shuffleMusic) {
          return playlist[Math.floor(Math.random() * playlist.length)];
        } else {
          let idx = playlist.indexOf(currentPlayingTrackId);
          if (idx === -1) idx = 0;
          else idx = (idx + 1) % playlist.length;
          return playlist[idx];
        }
      }

      function playMusic(specificTrackId = null, immediate = false) {
        if (isMusicPaused && !immediate) return;
        if (immediate) isMusicPaused = false;

        // Clear pending transition start if immediate
        if (immediate) {
          if (transitionTimeout) {
            clearTimeout(transitionTimeout);
            transitionTimeout = null;
          }
          if (isTransitioning) {
            clearInterval(fadeInterval);
            isTransitioning = false;
            stopAllAudio(); // Ensure clean slate
          }
        } else if (isTransitioning) return;

        let targetId = null;
        let targetFile = null;

        // Determine target track logic
        if (specificTrackId) {
          // User clicked a specific track
          targetId = specificTrackId;
          const libItem = MUSIC_LIBRARY.find((t) => t.id === targetId);
          if (libItem) {
            targetFile = libItem.file;
          } else {
            // Fallback for direct file paths or if unknown ID
            targetFile = targetId.includes(".") ? targetId : null;
          }
        } else if (activeLevelDisplay) {
          // In a level, automatic music
          if (
            currentGameMode === "speedrun" ||
            currentGameMode === "deathrun" ||
            currentGameMode === "chapter_speedrun"
          ) {
            // Speedrun/Deathrun music
            const t = MUSIC_LIBRARY.find((x) => x.id === "skate");
            if (t) {
              targetId = t.id;
              targetFile = t.file;
            }
          } else if (currentLevelData && currentLevelData.music) {
            let libItem = MUSIC_LIBRARY.find(
              (t) => t.id === currentLevelData.music,
            );
            if (!libItem) {
              libItem = MUSIC_LIBRARY.find(
                (t) => t.file === currentLevelData.music,
              );
            }

            if (libItem) {
              targetId = libItem.id;
              targetFile = libItem.file;
            } else {
              targetId = "level_custom";
              targetFile = currentLevelData.music;
            }
          } else {
            targetId = "synth";
          }
        } else {
          // In the menu, automatic music
          // Menu Mode
          targetId = menuMusicState.trackId || getNextPlaylistTrack();
          if (targetId !== "synth") {
            const t = MUSIC_LIBRARY.find((x) => x.id === targetId);
            targetFile = t ? t.file : null;
          }
        }

        if (targetId === currentPlayingTrackId && !immediate) return;

        if (immediate) {
          if (targetId === currentPlayingTrackId) {
            if (currentAudio && currentAudio.paused) currentAudio.play();
            if (
              currentPlayingTrackId === "synth" &&
              bgmOscillator &&
              synthGainNode
            ) {
              synthGainNode.gain.value = 0.02 * (gameSettings.volume / 100);
            }
            return;
          }
          stopAllAudio();
          startTrack(targetId, targetFile);
          return;
        }

        // Start Transition
        isTransitioning = true;

        // Fade out current
        const fadeTime = 500;
        const steps = 20;
        const volStep = gameSettings.volume / 100 / steps;

        fadeInterval = setInterval(() => {
          let done = true;
          if (currentAudio && currentAudio.volume > 0) {
            currentAudio.volume = Math.max(0, currentAudio.volume - volStep);
            done = false;
          }
          if (bgmOscillator && synthVolumeScale > 0) {
            synthVolumeScale = Math.max(0, synthVolumeScale - 1 / steps);
            done = false;
          }

          if (done) {
            clearInterval(fadeInterval);
            stopAllAudio();

            transitionTimeout = setTimeout(() => {
              startTrack(targetId, targetFile);
              isTransitioning = false;
              transitionTimeout = null;
            }, 300);
          }
        }, fadeTime / steps);
      }

      function stopAllAudio() {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
          currentAudio = null;
        }
        if (bgmOscillator) {
          bgmOscillator = null;
          synthGainNode = null;
        }
      }

      function startTrack(id, file) {
        currentPlayingTrackId = id;
        synthVolumeScale = 1.0;

        // Check restoration before updating state
        let shouldRestore = false;
        let restoreTime = 0;
        if (
          !activeLevelDisplay &&
          id === menuMusicState.trackId &&
          menuMusicState.time > 0
        ) {
          shouldRestore = true;
          restoreTime = menuMusicState.time;
        }

        // Update menu state if in menu to prevent reverting to old track
        if (!activeLevelDisplay) {
          menuMusicState.trackId = id;
          menuMusicState.time = 0;
        }

        if (file) {
          // Play Song
          currentAudio = new Audio(file);
          currentAudio.onerror = () => {
            console.warn("Audio load error, falling back to synth");
            startTrack("synth", null);
          };
          currentAudio.volume = gameSettings.volume / 100;

          if (activeLevelDisplay) {
            currentAudio.loop = true;
          } else {
            currentAudio.loop = false;
            // Restore time if resuming menu track
            if (shouldRestore) {
              currentAudio.currentTime = restoreTime;
            }
            currentAudio.addEventListener("ended", () => {
              const next = getNextPlaylistTrack();
              currentPlayingTrackId = null;
              playMusic(next);
            });
          }

          currentAudio
            .play()
            .catch((e) => console.warn("Audio play failed", e));

          if (!activeLevelDisplay) {
            const info = MUSIC_LIBRARY.find((t) => t.id === id);
            if (info) showMusicNotification(info.title, info.artist);
          }
        } else {
          // Play Synth
          playSynth();
          if (!activeLevelDisplay && id === "synth" && !isTransitioning) {
            showMusicNotification("Blockoverit", "Classic Synth");
          }
        }

        if (currentMenuView === "beats-menu") updateBeatsUI();
      }

      function showMusicNotification(title, artist) {
        let notif = document.getElementById("music-notif");
        if (!notif) {
          notif = document.createElement("div");
          notif.id = "music-notif";
          notif.className = "music-notification";
          document.body.appendChild(notif);
        }
        notif.innerHTML = `
                  <div class="music-notif-title">Now Playing</div>
                  <div style="font-size: 0.9rem; color: #fff;">${title}</div>
                  <div class="music-notif-artist">${artist}</div>
                `;

        requestAnimationFrame(() => {
          notif.classList.add("show");
          setTimeout(() => {
            notif.classList.remove("show");
          }, 4000);
        });
      }

      function playSynth() {
        if (bgmOscillator) return; // Already playing synth
        currentSynthId++;
        const thisSynthId = currentSynthId;

        const notes = [
          220, 0, 220, 0, 261, 0, 329, 0, 220, 0, 220, 0, 196, 0, 164, 0, 220,
          0, 329, 0, 392, 0, 440, 0, 392, 0, 329, 0, 261, 0, 246, 0,
        ];
        let noteIndex = 0;
        const tempo = 120;
        synthStartTime = Date.now();

        function playNextNote() {
          // Stop if we switched to a file or stopped synth
          if (thisSynthId !== currentSynthId) return;
          if (currentPlayingTrackId !== "synth") return;
          if (isMusicPaused) {
            setTimeout(playNextNote, 500);
            return;
          }

          // Synth duration limit (1.5 mins)
          if (Date.now() - synthStartTime > 90000) {
            if (activeLevelDisplay) {
              synthStartTime = Date.now();
            } else {
              currentPlayingTrackId = null;
              playMusic(getNextPlaylistTrack());
              return;
            }
          }

          const osc = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          synthGainNode = gainNode;

          osc.type = "square";
          osc.frequency.setValueAtTime(notes[noteIndex], audioCtx.currentTime);

          const vol = 0.1 * (gameSettings.volume / 100) * synthVolumeScale;
          gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(
            0.001,
            audioCtx.currentTime + tempo / 1000,
          );

          osc.connect(gainNode);
          gainNode.connect(audioCtx.destination);

          osc.start();
          osc.stop(audioCtx.currentTime + tempo / 1000);

          noteIndex = (noteIndex + 1) % notes.length;
          setTimeout(playNextNote, tempo);
        }

        if (audioCtx.state === "suspended") audioCtx.resume();
        bgmOscillator = true;
        playNextNote();
      }

      // --- Data & Persistence ---
      const SAVE_KEY = "blockoverit_v3_save";
      const CUSTOM_LEVELS_KEY = "blockoverit_custom_levels";
      const CUSTOM_LEVELS_PROGRESS_KEY = "blockoverit_custom_levels_progress";

      // Campaign Progress
      let gameState = JSON.parse(safeStorage.getItem(SAVE_KEY)) || {
        unlockedLevel: 0,
        unlockedLevelCh2: 0,
        unlockedLevelCh3: 0,
        unlockedLevelCh4: 0,
        unlockedLevelCh5: 0,
        gameBeaten: false,
        levelBlueCoins: {},
        blueCoinUnlockShown: false,
        chapter1Beaten: false,
        chapter2Beaten: false,
        chapter3Beaten: false,
        chapter4Beaten: false,
        chapter5Beaten: false,
      };

      // Migration for existing saves
      if (gameState.unlockedLevelCh2 === undefined)
        gameState.unlockedLevelCh2 = 0;
      if (gameState.unlockedLevelCh3 === undefined)
        gameState.unlockedLevelCh3 = 0;
      if (gameState.chapter3Beaten === undefined)
        gameState.chapter3Beaten = false;
      if (gameState.unlockedLevelCh4 === undefined)
        gameState.unlockedLevelCh4 = 0;
      if (gameState.chapter4Beaten === undefined)
        gameState.chapter4Beaten = false;
      if (gameState.unlockedLevelCh5 === undefined)
        gameState.unlockedLevelCh5 = 0;
      if (gameState.chapter5Beaten === undefined)
        gameState.chapter5Beaten = false;

      // Custom Levels Storage
      let customLevels =
        JSON.parse(safeStorage.getItem(CUSTOM_LEVELS_KEY)) || [];

      // Custom Levels Progress (tracks which levels have been beaten)
      let customLevelsProgress =
        JSON.parse(safeStorage.getItem(CUSTOM_LEVELS_PROGRESS_KEY)) || {};

      // Game Modes
      let currentGameMode = "campaign"; // 'campaign', 'custom', 'speedrun', 'deathrun'
      let gameTimer = 0;
      let gameTimerRunning = false;
      let gameTimerStart = 0;
      let speedrunEndTime = 0;
      let tempPracticeStack = null;

      // Highscores
      const HIGHSCORES_KEY = "blockoverit_highscores";
      let highscores = JSON.parse(safeStorage.getItem(HIGHSCORES_KEY)) || {};

      const MUSIC_LIBRARY = [
        {
          id: "synth",

      function getHighscoreKey(type, chapter, index, category = "any") {
        let prefix = "";
        if (currentGameMode === "speedrun") prefix = "speedrun_";
        else if (currentGameMode === "deathrun") prefix = "deathrun_";
        else if (currentGameMode === "chapter_speedrun")
          return `chapter_speedrun_${chapter}`;
        else if (currentGameMode === "impossible")
          return `impossible_chapter_${chapter}`;

        if (category === "blue") prefix += "blue_";

      // --- Confetti System ---
      const confettiCanvas = document.getElementById("confetti-canvas");
      const confettiCtx = confettiCanvas.getContext("2d");
      let confettiParticles = [];
      let confettiAnimationId = null;

      function resizeConfetti() {
        confettiCanvas.width = window.innerWidth;
        confettiCanvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resizeConfetti);
      resizeConfetti();

      function triggerConfetti() {
        for (let i = 0; i < 150; i++) {
          confettiParticles.push({
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            vx: (Math.random() - 0.5) * 25,
            vy: (Math.random() - 0.5) * 25,
            color: `hsl(${Math.random() * 360}, 100%, 50%)`,
            life: 100 + Math.random() * 50,
            size: Math.random() * 8 + 4,
          });
        }
        if (!confettiAnimationId) animateConfetti();
      }

      function animateConfetti() {
        confettiCtx.clearRect(
          0,
          0,
          confettiCanvas.width,
          confettiCanvas.height,
        );
        confettiParticles.forEach((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.2; // gravity
          p.vx *= 0.96; // friction
          p.life--;
          confettiCtx.fillStyle = p.color;
          confettiCtx.fillRect(p.x, p.y, p.size, p.size);
        });
        confettiParticles = confettiParticles.filter((p) => p.life > 0);
        if (confettiParticles.length > 0) {
          confettiAnimationId = requestAnimationFrame(animateConfetti);
        } else {
          confettiAnimationId = null;
          confettiCtx.clearRect(
            0,
            0,
            confettiCanvas.width,
            confettiCanvas.height,
          );
        }
      }

      // --- Popup System ---
      const popupManager = {
        queue: [],
        isActive: false,

        show(options) {
          this.queue.push(options);
          if (!this.isActive) {
            this.processQueue();
          }
        },

        processQueue() {
          if (this.queue.length === 0) {
            this.isActive = false;
            return;
          }
          this.isActive = true;
          const options = this.queue.shift();

          const overlay = document.createElement("div");
          overlay.className = "popup-overlay";

          const popup = document.createElement("div");
          popup.className = "popup";

          const titleEl = document.createElement("div");
          titleEl.className = "popup-title";
          titleEl.textContent = options.title;

          const messageEl = document.createElement("div");
          messageEl.className = "popup-message";
          if (options.html) {
            messageEl.innerHTML = options.html;
          } else {
            messageEl.textContent = options.message;
          }

          const buttonsDiv = document.createElement("div");
          buttonsDiv.className = "popup-buttons";

          const close = (callback) => {
            try {
              if (callback) callback();
            } catch (e) {
              console.error("Popup callback error:", e);
            }
            overlay.remove();
            // Use a small timeout to prevent UI flicker if another popup is in the queue
            setTimeout(() => this.processQueue(), 50);
          };

          const closeBtn = document.createElement("button");
          closeBtn.className = "popup-close";
          closeBtn.innerHTML = "&times;";
          closeBtn.onclick = () => close(options.onCancel);

          popup.appendChild(closeBtn);
          popup.appendChild(titleEl);
          popup.appendChild(messageEl);
          popup.appendChild(buttonsDiv);
          overlay.appendChild(popup);

          if (options.buttons && options.buttons.length > 0) {
            options.buttons.forEach((btnConfig) => {
              const btn = document.createElement("button");
              btn.className = `popup-btn ${btnConfig.class || ""}`;
              btn.textContent = btnConfig.text;
              btn.onclick = () => close(btnConfig.onClick);
              buttonsDiv.appendChild(btn);
            });
          } else {
            buttonsDiv.style.display = "none";
          }

          document.body.appendChild(overlay);
        },
      };

      function formatMSToHHMMSS(t) {
        if (!t) return "00:00:00";
        const totalSeconds = Math.floor(t / 1000);
        const hours = String(Math.floor(totalSeconds / 3600)).padStart(2, "0");
        const minutes = String(Math.floor((totalSeconds % 3600) / 60)).padStart(
          2,
          "0",
        );
        const seconds = String(totalSeconds % 60).padStart(2, "0");
        return `${hours}:${minutes}:${seconds}`;
      }

      function adjustColor(color, amount) {
        if (!color) return null;
        let usePound = false;
        if (color[0] == "#") {
          color = color.slice(1);
          usePound = true;
        }
        let num = parseInt(color, 16);
        let r = (num >> 16) + amount;
        if (r > 255) r = 255;
        else if (r < 0) r = 0;
        let b = ((num >> 8) & 0x00ff) + amount;
        if (b > 255) b = 255;
        else if (b < 0) b = 0;
        let g = (num & 0x0000ff) + amount;
        if (g > 255) g = 255;
        else if (g < 0) g = 0;
        return (
          (usePound ? "#" : "") +
          (g | (b << 8) | (r << 16)).toString(16).padStart(6, "0")
        );
      }

        if (!p) return;

        var myCenterY = this.pos.y + this.size.y / 2;
        var pCenterY = p.pos.y + p.size.y / 2;

        if (pCenterY >= this.pos.y && pCenterY <= this.pos.y + this.size.y) {
          var dir = p.pos.x > this.pos.x ? 1 : -1;
          var speed = 8;
          var motion = new Vector(dir * speed * step, 0);
          var newPos = this.pos.plus(motion);
          var blocked = false;

          var xStart = Math.floor(newPos.x);
          var xEnd = Math.ceil(newPos.x + this.size.x);
          var yStart = Math.floor(newPos.y);
          var yEnd = Math.ceil(newPos.y + this.size.y);
          for (var y = yStart; y < yEnd; y++) {
            for (var x = xStart; x < xEnd; x++) {
              if (y >= 0 && y < level.height && x >= 0 && x < level.width) {
                if (level.grid[y][x] === "wall") {
                  level.grid[y][x] = null;
                  level.backgroundDirty = true;
                  this.grinding = true;
                  blocked = true;

          var other = level.obstacleAt(newPos, this.size, this);
          if (other && typeof other !== "string") {
            if (other.type === "player") {
              level.playerTouched("grinder", this);
            } else if (
              other.type === "breakable-block" ||
              other.type === "moving-block"
            ) {
              other.toRemove = true;

      function SpikeLeft(pos) {

        this.size = new Vector(0.5, 0.6);
      }
      SpikeLeft.prototype.type = "spike-left";
      SpikeLeft.prototype.act = function (step, level) {};

      function SpikeRight(pos) {
        this.pos = pos.plus(new Vector(0.5, 0.2));
        this.size = new Vector(0.5, 0.6);
      }
      SpikeRight.prototype.type = "spike-right";
      SpikeRight.prototype.act = function (step, level) {};

      function SpikeBlockLeft(pos) {
        this.pos = pos;
        this.size = new Vector(1, 1);
        this.triggered = false;
      }
      SpikeBlockLeft.prototype.type = "spike-block-l";
      SpikeBlockLeft.prototype.act = function (step, level) {
        if (this.triggered) return;
        var p = level.player;
        if (!p) return;
        var dx = p.pos.x + p.size.x / 2 - (this.pos.x + this.size.x / 2);
        var dy = p.pos.y + p.size.y / 2 - (this.pos.y + this.size.y / 2);
        var dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 2.0) {
          var targetPos = this.pos.plus(new Vector(-1, 0));
          if (!level.obstacleAt(targetPos, new Vector(1, 1), null)) {
            for (let i = 0; i < (this.produceCount || 1); i++) {
              var p = targetPos.plus(new Vector(-i, 0));
              if (!level.obstacleAt(p, new Vector(1, 1), null)) {
                var spike = new SpikeLeft(p);
                spike.id = level.nextActorId++;
                level.actors.push(spike);
              }
            }
          }
          this.triggered = true;
        }
      };

      function SpikeBlockRight(pos) {
        this.pos = pos;
        this.size = new Vector(1, 1);
        this.triggered = false;
      }
      SpikeBlockRight.prototype.type = "spike-block-r";
      SpikeBlockRight.prototype.act = function (step, level) {
        if (this.triggered) return;
        var p = level.player;
        if (!p) return;
        var dx = p.pos.x + p.size.x / 2 - (this.pos.x + this.size.x / 2);
        var dy = p.pos.y + p.size.y / 2 - (this.pos.y + this.size.y / 2);
        var dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 2.0) {
          var targetPos = this.pos.plus(new Vector(1, 0));
          if (!level.obstacleAt(targetPos, new Vector(1, 1), null)) {
            for (let i = 0; i < (this.produceCount || 1); i++) {
              var p = targetPos.plus(new Vector(i, 0));
              if (!level.obstacleAt(p, new Vector(1, 1), null)) {
                var spike = new SpikeRight(p);
                spike.id = level.nextActorId++;
                level.actors.push(spike);
              }
            }
          }
          this.triggered = true;
        }
      };

      var actorchars = {
        "@": Player,
        o: Coin,
        "=": Lava,
        "|": Lava,
        v: Lava,
        B: BonusCoin,
        H: MovingBlock,
        V: MovingBlock,
        "^": RisingLava,
        S: Spike,
        s: UpsideDownSpike,
        F: FallingBlock,
        G: BreakableBlock,
        K: SpikeBlock,
        W: WallBlock,
        k: UpsideDownSpikeBlock,
        J: JumpPad,
        C: Grinder,
        ">": SlideRight,
        "<": SlideLeft,
        "[": SpikeLeft,
        "]": SpikeRight,
        "{": SpikeBlockLeft,
        "}": SpikeBlockRight,
      };

      function cloneActor(actor) {
        if (actor.type === "lava-group") {
          return new LavaGroup(actor.members.map((m) => cloneActor(m)));
        }
        if (actor.type === "moving-group") {
          return new MovingGroup(actor.members.map((m) => cloneActor(m)));
        }
        let newActor = Object.create(Object.getPrototypeOf(actor));
        Object.assign(newActor, actor);
        if (newActor.pos) newActor.pos = new Vector(actor.pos.x, actor.pos.y);
        if (newActor.size)
          newActor.size = new Vector(actor.size.x, actor.size.y);
        if (newActor.speed)
          newActor.speed = new Vector(actor.speed.x, actor.speed.y);
        if (newActor.basePos)
          newActor.basePos = new Vector(actor.basePos.x, actor.basePos.y);
        if (newActor.repeatPos)
          newActor.repeatPos = new Vector(actor.repeatPos.x, actor.repeatPos.y);
        return newActor;
      }

      function Level(levelData) {
        let plan = levelData.plan;
        if (!plan || plan.length === 0) {
          plan = [" "]; // Prevent crash on empty plan
        }

        this.colors = levelData.colors || {};
        this.gravity = levelData.gravity || 27; // Use level gravity or default
        this.riseInterval = levelData.riseInterval || 3;
        this.mirrorLevel = levelData.mirrorLevel || false;
        this.forceZoom = levelData.forceZoom || false;
        this.disableDeathAnim = levelData.disableDeathAnim || false;
        this.levelType = levelData.levelType || "campaign"; // Track level type
        this.chapter = levelData.chapter;
        this.customLevelIndex =
          levelData.customLevelIndex !== undefined
            ? levelData.customLevelIndex
            : -1; // Track custom level index
        this.width = plan[0].length;
        this.height = plan.length;
        this.grid = [];
        this.actors = [];
        this.practiceState = null;
        this.backgroundDirty = true;
        this.totalBlueCoins = 0;
        this.blueCoinsCollected = 0;
        this.nextActorId = 0;
        this.actions = levelData.actions || [];
        this.parsedActions = this.parseActions(this.actions);
        this.fakes = new Set(levelData.fakes || []);
        this.risingThrough = new Set(levelData.risingThrough || []);
        this.risingSpeeds = levelData.risingSpeeds || {};
        this.illusions = new Set(levelData.illusions || []);
        this.flickers = new Set(levelData.flickers || []);
        this.touchFlickers = new Set(levelData.touchFlickers || []);
        this.jumpFlickers = new Set(levelData.jumpFlickers || []);
        this.blockConfigs = levelData.blockConfigs || {};
        this.age = 0;
        this.practiceStack = [];
        this.playerHasMoved = false;

        for (var y = 0; y < this.height; y++) {
          var line = plan[y],
            gridLine = [];
          for (var x = 0; x < this.width; x++) {
            var ch = line[x],
              fieldType = null;

            var color = this.colors[`${x},${y}`];
            var isFake = this.fakes.has(x + "," + y);

            // Merging Moving Blocks
            if (ch === "H") {
              var left = this.actors.find(
                (a) =>
                  a.type === "moving-block" &&
                  a.text === "↔" &&
                  a.pos.y === y &&
                  Math.abs(a.pos.x + a.size.x - x) < 0.1 &&
                  a.color === color &&
                  !!a.fake === isFake,
              );
              if (left) {
                left.size.x += 1;
                gridLine.push(null);
                continue;
              }
            }
            if (ch === "V") {
              var top = this.actors.find(
                (a) =>
                  a.type === "moving-block" &&
                  a.text === "↕" &&
                  a.pos.x === x &&
                  Math.abs(a.pos.y + a.size.y - y) < 0.1 &&
                  a.color === color &&
                  !!a.fake === isFake,
              );
              if (top) {
                top.size.y += 1;
                gridLine.push(null);
                continue;
              }
            }

            // Merging Lava
            if (ch === "=") {
              var left = this.actors.find(
                (a) =>
                  a.type === "lava" &&
                  a.speed.x !== 0 &&
                  a.pos.y === y &&
                  Math.abs(a.pos.x + a.size.x - x) < 0.1 &&
                  a.color === color &&
                  !!a.fake === isFake,
              );
              if (left) {
                left.size.x += 1;
                gridLine.push(null);
                continue;
              }
            }
            if (ch === "|") {
              var top = this.actors.find(
                (a) =>
                  a.type === "lava" &&
                  a.speed.y !== 0 &&
                  !a.repeatPos && // Exclude dripping lava
                  a.pos.x === x &&
                  Math.abs(a.pos.y + a.size.y - y) < 0.1 &&
                  a.color === color &&
                  !!a.fake === isFake,
              );
              if (top) {
                top.size.y += 1;
                gridLine.push(null);
                continue;
              }
            }

            // Merging Grinders
            if (ch === "C") {
              var top = this.actors.find(
                (a) =>
                  a.type === "grinder" &&
                  a.pos.x === x &&
                  Math.abs(a.pos.y + a.size.y - y) < 0.1,
              );
              if (top) {
                top.size.y += 1;
                gridLine.push(null);
                continue;
              }
            }

            var Actor = actorchars[ch];
            if (Actor) {
              if (ch === "B") {
                // Blue coin spawns if conditions are met:
                // - Campaign: game must be beaten
                // - Custom: level must be beaten before
                let shouldSpawnBlueCoin = false;
                if (currentGameMode !== "deathrun") {
                  if (this.levelType === "campaign") {
                    if (this.chapter === 1 && gameState.chapter1Beaten)
                      shouldSpawnBlueCoin = true;
                    else if (this.chapter === 2 && gameState.chapter2Beaten)
                      shouldSpawnBlueCoin = true;
                    else if (this.chapter === 3 && gameState.chapter3Beaten)
                      shouldSpawnBlueCoin = true;
                  } else if (
                    this.levelType === "custom" &&
                    this.customLevelIndex >= 0 &&
                    customLevelsProgress[this.customLevelIndex]
                  ) {
                    shouldSpawnBlueCoin = true;
                  }
                }
                if (shouldSpawnBlueCoin) {
                  this.totalBlueCoins++;
                  var actor = new Actor(new Vector(x, y), ch);
                  if (color) actor.color = color;
                  if (isFake) actor.fake = true;
                  actor.id = this.nextActorId++;
                  this.actors.push(actor);
                }
              } else {
                var actor = new Actor(new Vector(x, y), ch);
                if (ch === "G" && this.illusions.has(x + "," + y)) {
                  actor.isIllusion = true;
                }
                // Flicker logic for all actors
                if (this.flickers.has(`${x},${y}`)) actor.isFlicker = true;
                if (this.touchFlickers.has(`${x},${y}`))
                  actor.isTouchFlicker = true;
                if (this.jumpFlickers.has(`${x},${y}`))
                  actor.isJumpFlicker = true;

                // Legacy support
                if (color === "flicker") actor.isFlicker = true;
                if (color === "jump_flicker") actor.isJumpFlicker = true;
                if (color === "touch_flicker") actor.isTouchFlicker = true;

                if (
                  actor.isFlicker ||
                  actor.isJumpFlicker ||
                  actor.isTouchFlicker
                ) {
                  actor.flickerType = color;
                  actor.isVisible = false;
                  actor.flickerTimer = 0;
                  actor.flickerVisibleTime = 0;
                }
                if (color) actor.color = color;
                if (isFake) actor.fake = true;
                if (
                  ch === "^" &&
                  this.risingSpeeds[`${x},${y}`] !== undefined
                ) {
                  actor.riseInterval = this.risingSpeeds[`${x},${y}`];
                }
                if (
                  ["W", "K", "k", "{", "}"].includes(ch) &&
                  this.blockConfigs &&
                  this.blockConfigs[`${x},${y}`]
                ) {
                  actor.produceCount =
                    this.blockConfigs[`${x},${y}`].count || 1;
                }
                actor.id = this.nextActorId++;
                this.actors.push(actor);
              }
            } else if (ch === "x") {
              let isFlicker =
                this.flickers.has(`${x},${y}`) || color === "flicker";
              let isTouchFlicker =
                this.touchFlickers.has(`${x},${y}`) ||
                color === "touch_flicker";
              let isJumpFlicker =
                this.jumpFlickers.has(`${x},${y}`) || color === "jump_flicker";

              if (isFlicker || isTouchFlicker || isJumpFlicker) {
                var wall = new VisualWall(new Vector(x, y), color);
                wall.isFlicker = isFlicker;
                wall.isTouchFlicker = isTouchFlicker;
                wall.isJumpFlicker = isJumpFlicker;
                wall.flickerType = "combined";
                wall.isVisible = false;
                wall.flickerTimer = 0;
                wall.flickerVisibleTime = 0;
                wall.id = this.nextActorId++;
                this.actors.push(wall);
                fieldType = "wall"; // Keep in grid for collision
              } else {
                fieldType = "wall";
              }
            } else if (ch === "!") {
              var lava = new Lava(new Vector(x, y), "!");
              lava.id = this.nextActorId++;
              if (color) lava.color = color;
              if (isFake) lava.fake = true;
              if (this.risingThrough.has(x + "," + y))
                lava.throughBlocks = true;
              this.actors.push(lava);
            }
            gridLine.push(fieldType);
          }
          this.grid.push(gridLine);
        }
        this.players = this.actors.filter((a) => a.type === "player");
        this.player = this.players[0];
        this.status = this.finishDelay = null;

        // Apply risingThrough to RisingLava actors
        this.actors
          .filter((a) => a.type === "rising-lava")
          .forEach((a) => {
            if (
              this.risingThrough.has(
                Math.round(a.pos.x) + "," + Math.round(a.pos.y),
              )
            )
              a.throughBlocks = true;
          });

        this.groupLavas();
        this.groupMovingBlocks();

        // Optimization: Cache dynamic actors
        this.dynamicActors = this.actors.filter(
          (a) =>
            a.type === "moving-block" ||
            a.type === "moving-group" ||
            a.type === "lava-group" ||
            (a.type === "lava" && a.speed),
        );
      }

      Level.prototype.parseActions = function (actions) {
        return actions
          .map((a) => {
            const match = a.match(/\[\["(.*?)"\s*\|\s*(.*?)\s*\|\s*(.*?)\]\]/);
            if (!match) return null;
            return {
              title: match[1].trim(),
              triggerStr: match[2].trim(),
              funcStr: match[3].trim(),
              executed: false,
            };
          })
          .filter((a) => a);
      };

      Level.prototype.checkTriggers = function (step) {
        this.age += step;
        this.parsedActions.forEach((action) => {
          // Parse Trigger
          let triggered = false;
          const t = action.triggerStr;

          if (t.startsWith("timeInterval")) {
            const match = t.match(/timeInterval\s*\(\s*([\d\.]+)\s*\)/);
            if (match) {
              const interval = parseFloat(match[1]);
              // Trigger every x seconds. Use a small epsilon for float comparison or check if we crossed the threshold this frame
              const prevAge = this.age - step;
              if (
                Math.floor(this.age / interval) > Math.floor(prevAge / interval)
              ) {
                triggered = true;
              }
            }
          } else if (t.startsWith("time")) {
            const match = t.match(/^time\s*\(\s*([\d\.]+)\s*\)/);
            if (match) {
              const target = parseFloat(match[1]);
              if (this.age >= target && !action.executed) {
                triggered = true;
                action.executed = true;
              }
            }
          } else if (t.startsWith("onBlock")) {
            const match = t.match(/onBlock\s*\(\s*(\d+)\s*,\s*(\d+)\s*\)/);
            if (match && this.players.length > 0) {
              const x = parseInt(match[1]);
              const y = parseInt(match[2]);
              // Check if player center is within block
              const triggered = this.players.some((p) => {
                const cx = Math.floor(p.pos.x + p.size.x / 2);
                const cy = Math.floor(p.pos.y + p.size.y / 2);
                return cx === x && cy === y;
              });
              if (triggered && !action.executed) {
                triggered = true;
                action.executed = true;
              }
            }
          }
          // 'action' and 'blueCoin' triggers are handled via events/calls

          if (triggered) this.executeAction(action);
        });
      };

      Level.prototype.executeAction = function (action) {
        const f = action.funcStr;

        // Check for chained actions
        this.parsedActions.forEach((other) => {
          const match = other.triggerStr.match(/action\s*\(\s*"(.*?)"\s*\)/);
          if (match && match[1] === action.title) {
            this.executeAction(other);
          }
        });

        if (f.startsWith("color")) {
          const match = f.match(
            /color\s*\(\s*(\d+)\s*,\s*(\d+)\s*:\s*(#\w+)\s*\)/,
          );
          if (match) {
            const x = parseInt(match[1]),
              y = parseInt(match[2]),
              col = match[3];
            this.colors[`${x},${y}`] = col;
            this.backgroundDirty = true; // In case it's a wall
            // Update actors if any
            this.actors.forEach((a) => {
              if (Math.round(a.pos.x) === x && Math.round(a.pos.y) === y)
                a.color = col;
            });
          }
        } else if (f.startsWith("removeColor")) {
          const match = f.match(/removeColor\s*\(\s*(\d+)\s*,\s*(\d+)\s*\)/);
          if (match) {
            const x = parseInt(match[1]),
              y = parseInt(match[2]);
            delete this.colors[`${x},${y}`];
            this.backgroundDirty = true;
            this.actors.forEach((a) => {
              if (Math.round(a.pos.x) === x && Math.round(a.pos.y) === y)
                delete a.color;
            });
          }
        } else if (f.startsWith("tempColor")) {
          const match = f.match(
            /tempColor\s*\(\s*(\d+)\s*,\s*(\d+)\s*:\s*(#\w+)\s*,\s*(\d+)\s*\)/,
          );
          if (match) {
            const x = parseInt(match[1]),
              y = parseInt(match[2]),
              col = match[3],
              ms = parseInt(match[4]);
            const oldColor = this.colors[`${x},${y}`];
            this.colors[`${x},${y}`] = col;
            this.backgroundDirty = true;
            this.actors.forEach((a) => {
              if (Math.round(a.pos.x) === x && Math.round(a.pos.y) === y)
                a.color = col;
            });

            setTimeout(() => {
              if (activeLevelDisplay && activeLevelDisplay.level === this) {
                if (oldColor) this.colors[`${x},${y}`] = oldColor;
                else delete this.colors[`${x},${y}`];
                this.backgroundDirty = true;
                this.actors.forEach((a) => {
                  if (Math.round(a.pos.x) === x && Math.round(a.pos.y) === y) {
                    if (oldColor) a.color = oldColor;
                    else delete a.color;
                  }
                });
              }
            }, ms);
          }
        } else if (f.startsWith("randColor")) {
          const match = f.match(/randColor\s*\(\s*(\d+)\s*,\s*(\d+)\s*\)/);
          if (match) {
            const x = parseInt(match[1]),
              y = parseInt(match[2]);
            const col = `hsl(${Math.random() * 360}, 70%, 50%)`;
            // Convert HSL to Hex or just use HSL string (CSS supports it)
            this.colors[`${x},${y}`] = col;
            this.backgroundDirty = true;
            this.actors.forEach((a) => {
              if (Math.round(a.pos.x) === x && Math.round(a.pos.y) === y)
                a.color = col;
            });
          }
        } else if (f.startsWith("delBlock")) {
          const match = f.match(/delBlock\s*\(\s*(\d+)\s*,\s*(\d+)\s*\)/);
          if (match) {
            const x = parseInt(match[1]),
              y = parseInt(match[2]);
            if (y >= 0 && y < this.height && x >= 0 && x < this.width) {
              this.grid[y][x] = null;
              this.backgroundDirty = true;
              this.actors = this.actors.filter(
                (a) =>
                  !(Math.round(a.pos.x) === x && Math.round(a.pos.y) === y),
              );
              // Re-cache dynamic actors
              this.dynamicActors = this.actors.filter(
                (a) =>
                  a.type === "moving-block" ||
                  a.type === "moving-group" ||
                  a.type === "lava-group" ||
                  (a.type === "lava" && a.speed),
              );
            }
          }
        } else if (f.startsWith("addBlock")) {
          const match = f.match(
            /addBlock\s*\(\s*(\d+)\s*,\s*(\d+)\s*:\s*(\S)\s*\)/,
          );
          if (match) {
            const x = parseInt(match[1]),
              y = parseInt(match[2]),
              type = match[3];
            if (y >= 0 && y < this.height && x >= 0 && x < this.width) {
              // Remove existing first
              this.grid[y][x] = null;
              this.actors = this.actors.filter(
                (a) =>
                  !(Math.round(a.pos.x) === x && Math.round(a.pos.y) === y),
              );

              // Add new
              const Actor = actorchars[type];
              if (Actor) {
                const actor = new Actor(new Vector(x, y), type);
                actor.id = this.nextActorId++;
                this.actors.push(actor);
                if (this.colors[`${x},${y}`])
                  actor.color = this.colors[`${x},${y}`];
              } else if (type === "x") {
                this.grid[y][x] = "wall";
              } else if (type === "!") {
                const lava = new Lava(new Vector(x, y), "!");
                lava.id = this.nextActorId++;
                this.actors.push(lava);
              }
              this.backgroundDirty = true;
              this.dynamicActors = this.actors.filter(
                (a) =>
                  a.type === "moving-block" ||
                  a.type === "moving-group" ||
                  a.type === "lava-group" ||
                  (a.type === "lava" && a.speed),
              );
            }
          }
        } else if (f.startsWith("music")) {
          const match = f.match(/music\s*\(\s*["']?(.*?)["']?\s*\)/);
          if (match) {
            playMusic(match[1], true);
          }
        } else if (f === "win") {
          this.status = "won";
          this.finishDelay = 1;
        } else if (f === "lose") {
          this.status = "lost";
          this.finishDelay = 1;
        } else if (f.startsWith("gravity")) {
          const match = f.match(/gravity\s*\(\s*([\d\.]+)\s*\)/);
          if (match) {
            this.gravity = parseFloat(match[1]);
          }
        } else if (f.startsWith("message")) {
          const match = f.match(/message\s*\(\s*["']?(.*?)["']?\s*\)/);
          if (match) {
            showPopup("MESSAGE", match[1], () => {});
          }
        } else if (f.startsWith("teleport")) {
          const match = f.match(/teleport\s*\(\s*(\d+)\s*,\s*(\d+)\s*\)/);
          if (match && this.players.length > 0) {
            this.players.forEach((p) => {
              p.pos = new Vector(parseInt(match[1]), parseInt(match[2]));
              p.speed = new Vector(0, 0);
            });
          }
        } else if (f.startsWith("checkpoint")) {
          const match = f.match(/checkpoint\s*\(\s*(\d+)\s*,\s*(\d+)\s*\)/);
          if (match && currentLevelData && currentLevelData.plan) {
            const nx = parseInt(match[1]);
            const ny = parseInt(match[2]);
            // Update current level data plan to move @ to new pos
            // First remove old @
            currentLevelData.plan = currentLevelData.plan.map((row) =>
              row.replace("@", " "),
            );
            // Place new @
            if (ny < currentLevelData.plan.length) {
              let row = currentLevelData.plan[ny].split("");
              if (nx < row.length) {
                row[nx] = "@";
                currentLevelData.plan[ny] = row.join("");
                // Visual feedback
                showMusicNotification("Checkpoint", "Spawn point set!");
              }
            }
          }
        }
      };

      Level.prototype.isFinished = function () {
        return this.status != null && this.finishDelay < 0;
      };

      // --- Physics ---

      // Lava Grouping Logic
      function LavaGroup(members) {
        this.members = members;
        this.type = "lava-group";
        this.speed = members[0].speed;
      }

      LavaGroup.prototype.act = function (step, level) {
        var newPosList = this.members.map((m) =>
          m.pos.plus(this.speed.times(step)),
        );
        var collision = false;

        // Check collision for all members. If any member hits a wall, the whole group reverses.
        for (var i = 0; i < newPosList.length; i++) {
          if (level.obstacleAt(newPosList[i], this.members[i].size, this)) {
            collision = true;
            break;
          }
        }

        if (collision) {
          this.speed = this.speed.times(-1);
        } else {
          for (var i = 0; i < this.members.length; i++) {
            this.members[i].pos = newPosList[i];
          }
        }
      };

      Level.prototype.groupLavas = function () {
        var visited = new Set();
        var newActors = [];
        var lavas = this.actors.filter(
          (a) => a.type === "lava" && !a.repeatPos,
        );
        var others = this.actors.filter(
          (a) => a.type !== "lava" || (a.type === "lava" && a.repeatPos),
        );

        // Optimization: Map coordinates to lava actors for O(1) lookup
        var lavaMap = {};
        lavas.forEach((l) => {
          lavaMap[Math.round(l.pos.x) + "," + Math.round(l.pos.y)] = l;
        });

        for (var i = 0; i < lavas.length; i++) {
          var lava = lavas[i];
          if (visited.has(lava)) continue;

          var group = [lava];
          visited.add(lava);
